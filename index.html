    { name: 'Konstruktion', type: 'singleSelect', options: { choices: KONSTRUKTION_OPTIONS.map(n => ({ name: n })) } },
    { name: 'Öffnungsart', type: 'singleSelect', options: { choices: ÖFFNUNGSART_OPTIONS.map(n => ({ name: n })) } },
    { name: 'Öffnungs-Notiz', type: 'multilineText' },
    // NEW: Ornament-Text (von Fensterdetails vorausgefüllt, unidirektional)
    { name: 'Ornament Text', type: 'singleLineText' },
    // NEW: Außenfensterbank pro Position (Ja/Nein)
    { name: 'Außenfensterbank Position', type: 'checkbox', options: { icon: 'check', color: 'greenBright' } },
    { name: 'Ornamentglas', type: 'checkbox', options: { icon: 'check', color: 'greenBright' } },
    { name: 'Bedienung Typ', type: 'singleSelect', options: { choices: BEDIENUNG_TYP_OPTIONS.map(n => ({ name: n })) } },
    { name: 'Bedienung Seite', type: 'singleSelect', options: { choices: LR_OPTIONS.map(n => ({ name: n })) } },
    { name: 'Bedienung Notiz', type: 'singleLineText' },
    { name: 'Insektenschutz', type: 'singleSelect', options: { choices: INSEKTENSCHUTZ_OPTIONS.map(n => ({ name: n })) } },
    { name: 'Insektenschutz Notiz', type: 'singleLineText' },
    { name: 'Notizen', type: 'multilineText' },
    { name: 'Notiz-Foto', type: 'multipleAttachments' },
  ],
};

async function metaApi(path, options = {}) {
  const res = await fetch(airtableMetaUrl(path), {
    ...options,
    headers: {
      'Authorization': authHeader(),
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    console.error('Meta API error:', res.status, err);
    throw new Error(`Meta ${res.status}: ${err}`);
  }
  return res.json();
}

async function bootstrapSchema() {
  showSpinner(true);
  dbg('Bootstrap gestartet…', 'info');
  try {
    // 1. list existing tables
    dbg('Rufe Base-Schema ab…', 'info');
    const schema = await metaApi('/tables');
    dbg(`Schema geladen: ${schema.tables.length} Tabellen vorhanden`, 'ok');
    const existing = {};
    for (const t of schema.tables) {
      existing[t.name] = t;
      dbg(`  → "${t.name}" (${t.fields.length} Felder)`, 'info');
    }

    const order = [T_AUFMASS, T_TECHNIK, T_POSITIONEN];
    let created = false;

    // 2. create tables
    for (const tableName of order) {
      if (existing[tableName]) {
        dbg(`✓ Tabelle "${tableName}" existiert bereits`, 'ok');
        continue;
      }
      created = true;
      let fields = SCHEMA[tableName].map(f => ({ ...f }));
      dbg(`→ Lege Tabelle "${tableName}" an mit ${fields.length} Feldern…`, 'info');
      try {
        const newTable = await metaApi('/tables', {
          method: 'POST',
          body: JSON.stringify({ name: tableName, fields: fields })
        });
        existing[tableName] = newTable;
        dbg(`✓ "${tableName}" erfolgreich angelegt`, 'ok');
      } catch (err) {
        dbg(`✗ Fehler beim Anlegen von "${tableName}": ${err.message}`, 'error');
        throw err;
      }
    }

    // 2b. Add missing fields to existing tables (für Schema-Updates)
    for (const tableName of order) {
      const table = existing[tableName];
      const existingFieldNames = new Set(table.fields.map(f => f.name));
      const wanted = SCHEMA[tableName];
      for (let i = 0; i < wanted.length; i++) {
        const f = wanted[i];
        if (existingFieldNames.has(f.name)) continue;
        if (i === 0) continue; // skip primary field
        dbg(`→ Feld "${f.name}" → "${tableName}"`, 'info');
        try {
          const newField = await metaApi(`/tables/${table.id}/fields`, {
            method: 'POST',
            body: JSON.stringify(f)
          });
          table.fields.push(newField);
          created = true;
        } catch (err) {
          dbg(`⚠ Feld "${f.name}": ${err.message}`, 'error');
        }
      }
    }

    // 2c. Sync options for existing singleSelect/multipleSelects fields
    // (ergänzt fehlende Choices, damit z.B. "Links/Rechts" neben alten "links/rechts/fest/..." existieren)
    for (const tableName of order) {
      const table = existing[tableName];
      const wanted = SCHEMA[tableName];
      for (const wf of wanted) {
        if (wf.type !== 'singleSelect' && wf.type !== 'multipleSelects') continue;
        if (!wf.options?.choices) continue;
        const existingField = table.fields.find(f => f.name === wf.name);
        if (!existingField) continue;
        if (existingField.type !== 'singleSelect' && existingField.type !== 'multipleSelects') continue;
        const existingChoices = existingField.options?.choices || [];
        const existingChoiceNames = new Set(existingChoices.map(c => c.name));
        const missing = wf.options.choices.filter(c => !existingChoiceNames.has(c.name));
        if (missing.length === 0) continue;
        dbg(`→ Ergänze ${missing.length} Option(en) für "${wf.name}"`, 'info');
        // Airtable PATCH format: keep existing choices with their IDs, append new ones with just {name}
        const mergedChoices = [
          ...existingChoices.map(c => ({ id: c.id, name: c.name })),
          ...missing.map(c => ({ name: c.name }))
        ];
        try {
          await metaApi(`/tables/${table.id}/fields/${existingField.id}`, {
            method: 'PATCH',
            body: JSON.stringify({ options: { choices: mergedChoices } })
          });
          existingField.options = { choices: mergedChoices };
          dbg(`✓ Optionen für "${wf.name}" aktualisiert`, 'ok');
        } catch (err) {
          // Fallback: versuche Feld komplett zu ersetzen (löschen + neu anlegen)
          dbg(`⚠ Options-Sync "${wf.name}" Standard-PATCH fehlgeschlagen, versuche Fallback…`, 'info');
          try {
            // Alternative: nur "name" ohne ids senden (manche Airtable-Versionen wollen das)
            const nameOnly = mergedChoices.map(c => ({ name: c.name }));
            await metaApi(`/tables/${table.id}/fields/${existingField.id}`, {
              method: 'PATCH',
              body: JSON.stringify({ options: { choices: nameOnly } })
            });
            dbg(`✓ Optionen für "${wf.name}" (name-only) aktualisiert`, 'ok');
          } catch (err2) {
            dbg(`✗ Options-Sync "${wf.name}" endgültig fehlgeschlagen: ${err2.message}`, 'error');
            dbg(`   Bitte "Öffnungsrichtung" in Airtable manuell um "Links"/"Rechts" erweitern`, 'info');
          }
        }
      }
    }

    // 3. Add link fields
    const aufmassId = existing[T_AUFMASS].id;
    for (const tableName of [T_TECHNIK, T_POSITIONEN]) {
      const table = existing[tableName];
      const hasLink = table.fields.some(f => f.name === 'Aufmaß' && f.type === 'multipleRecordLinks');
      if (hasLink) {
        dbg(`✓ Link-Feld in "${tableName}" vorhanden`, 'ok');
        continue;
      }
      dbg(`→ Füge Link-Feld "Aufmaß" zu "${tableName}" hinzu…`, 'info');
      try {
        await metaApi(`/tables/${table.id}/fields`, {
          method: 'POST',
          body: JSON.stringify({
            name: 'Aufmaß',
            type: 'multipleRecordLinks',
            options: { linkedTableId: aufmassId }
          })
        });
        created = true;
        dbg(`✓ Link-Feld zu "${tableName}" hinzugefügt`, 'ok');
      } catch (err) {
        dbg(`✗ Link-Feld-Fehler bei "${tableName}": ${err.message}`, 'error');
        throw err;
      }
    }

    if (created) {
      dbg('🎉 Bootstrap abgeschlossen — alle Tabellen bereit', 'ok');
      toast('Tabellen angelegt', 'success');
    } else {
      dbg('Alle Tabellen bereits vorhanden', 'ok');
    }

    // Populate fieldTypes map from actual Airtable schema (after bootstrap)
    // So saveField knows whether to send a number or a string
    try {
      const freshSchema = await metaApi('/tables');
      fieldTypes = {};
      for (const t of freshSchema.tables) {
        fieldTypes[t.name] = {};
        for (const f of t.fields) {
          fieldTypes[t.name][f.name] = f.type;
        }
      }
      dbg(`Feldtypen geladen: ${Object.keys(fieldTypes).length} Tabellen`, 'ok');
      // Log critical fields for debugging
      if (fieldTypes[T_POSITIONEN]) {
        dbg(`Nutmaß: ${fieldTypes[T_POSITIONEN]['Nutmaß']}, Einstand: ${fieldTypes[T_POSITIONEN]['Einstand']}, Öffnungsrichtung: ${fieldTypes[T_POSITIONEN]['Öffnungsrichtung']}`, 'info');
      }
    } catch (e) {
      dbg(`Feldtypen konnten nicht geladen werden: ${e.message}`, 'error');
    }
  } catch (e) {
    dbg(`FEHLER: ${e.message}`, 'error');
    dbgShow();
    toast('Schema-Setup fehlgeschlagen', 'error');
    throw e;
  } finally {
    showSpinner(false);
  }
}

/* =============================================================
   AUTH
   In proxy mode: login goes through Worker /auth/login, returns
   session token (JWT) which is used for all subsequent requests.
   In fallback mode: SHA-256 hash check against hardcoded credentials.
============================================================= */
const AUTH_HASH = 'b35a3b8883b151d5e91b5b5afa055a2c058d77fa305b2ea5ec5ff874fc33a471';
const AUTH_SALT = 'schuler-aufmass-2026';
const AUTH_KEY = 'schuler_aufmass_authed_v1';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Local hash check (fallback mode only)
async function checkLoginLocal(user, pw) {
  const hash = await sha256(`${user}:${pw}:${AUTH_SALT}`);
  return hash === AUTH_HASH;
}

// Worker login (proxy mode)
async function checkLoginRemote(user, pw) {
  const res = await fetch(`${API_BASE_URL}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pw }),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || 'Anmeldung fehlgeschlagen');
  }
  const data = await res.json();
  if (!data.token) throw new Error('Kein Token erhalten');
  setSessionToken(data.token);
  setSessionUser({
    username: data.username,
    displayName: data.displayName || data.username,
    verkauf: data.verkauf || data.displayName || data.username,
  });
  return true;
}

// Verify existing session token (proxy mode only)
async function verifySession() {
  if (!USE_PROXY) return isAuthed();
  const tok = getSessionToken();
  if (!tok) return false;
  try {
    const res = await fetch(`${API_BASE_URL}/auth/verify`, {
      headers: { 'Authorization': `Bearer ${tok}` },
    });
    if (!res.ok) {
      clearSession();
      return false;
    }
    const data = await res.json();
    if (data.valid) {
      // Update stored user profile in case it changed
      setSessionUser({
        username: data.username,
        displayName: data.displayName || data.username,
        verkauf: data.verkauf || data.displayName || data.username,
      });
    }
    return !!data.valid;
  } catch (e) {
    return true;
  }
}

function isAuthed() {
  if (USE_PROXY) {
    return !!getSessionToken();
  }
  try { return sessionStorage.getItem(AUTH_KEY) === '1' || localStorage.getItem(AUTH_KEY) === '1'; }
  catch { return false; }
}

function setAuthed(remember) {
  if (USE_PROXY) return; // proxy mode uses session tokens via setSessionToken
  try {
    sessionStorage.setItem(AUTH_KEY, '1');
    if (remember) localStorage.setItem(AUTH_KEY, '1');
  } catch {}
}

function showLoginOverlay() {
  document.getElementById('login-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('login-user').focus(), 100);
}

function hideLoginOverlay() {
  document.getElementById('login-overlay').classList.add('hidden');
}

function logout() {
  if (USE_PROXY) clearSession();
  else {
    try {
      sessionStorage.removeItem(AUTH_KEY);
      localStorage.removeItem(AUTH_KEY);
    } catch {}
  }
  showLoginOverlay();
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('login-user').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!user || !pw) { errEl.textContent = 'Bitte Nutzername und Passwort eingeben'; return; }
  try {
    if (USE_PROXY) {
      await checkLoginRemote(user, pw);
    } else {
      const ok = await checkLoginLocal(user, pw);
      if (!ok) {
        errEl.textContent = 'Falsche Zugangsdaten';
        document.getElementById('login-pw').value = '';
        return;
      }
      setAuthed(true);
    }
    hideLoginOverlay();
    init();
  } catch (e) {
    errEl.textContent = e.message || 'Fehler bei der Anmeldung';
    document.getElementById('login-pw').value = '';
  }
});

/* =============================================================
   INIT
============================================================= */
async function init() {
  window.addEventListener('error', (e) => {
    dbg(`JS-Fehler: ${e.message} (${e.filename}:${e.lineno})`, 'error');
  });
  window.addEventListener('unhandledrejection', (e) => {
    dbg(`Promise-Fehler: ${e.reason?.message || e.reason}`, 'error');
  });
  dbg(`App gestartet (${USE_PROXY ? 'Proxy-Modus' : 'Direkt-Modus'})`, 'info');
  try {
    await bootstrapSchema();
  } catch (e) {
    return;
  }
  await loadDashboard();
}

// Boot: validate session, then either show app or login
(async () => {
  if (USE_PROXY) {
    const valid = await verifySession();
    if (valid) {
      hideLoginOverlay();
      init();
    } else {
      showLoginOverlay();
    }
  } else {
    if (isAuthed()) {
      hideLoginOverlay();
      init();
    } else {
      setTimeout(() => document.getElementById('login-user').focus(), 100);
    }
  }
})();
</script>
