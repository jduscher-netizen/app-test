            ${INSEKTENSCHUTZ_OPTIONS.map(o => `<option value="${o}" ${f['Insektenschutz']===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Notiz</label>
          <input type="text" data-key="Insektenschutz Notiz" value="${escapeHtml(f['Insektenschutz Notiz']||'')}" ${!rolladenActive?'disabled':''}>
        </div>
      </div>

      <div class="section-title">14. Notizen</div>
      <div class="field"><textarea data-key="Notizen">${escapeHtml(f['Notizen']||'')}</textarea></div>
      <div class="field">
        <label>Foto zur Notiz (optional)</label>
        ${(Array.isArray(f['Notiz-Foto']) && f['Notiz-Foto'].length > 0)
          ? `<div class="note-photo-wrap">
              <img src="${f['Notiz-Foto'][0].url}" class="note-photo-preview" alt="Notiz-Foto">
              <div class="note-photo-actions">
                <label class="sketch-btn" for="note-photo-input">Ersetzen</label>
                <button type="button" class="sketch-btn danger" id="note-photo-remove-btn">Entfernen</button>
              </div>
            </div>`
          : `<div class="note-photo-actions">
              <label class="note-photo-empty" for="note-photo-input">📷 Foto aufnehmen</label>
              <label class="note-photo-empty" for="note-photo-input-library">🖼 Foto wählen</label>
            </div>`
        }
        <input type="file" accept="image/*" capture="environment" id="note-photo-input" style="display:none;">
        <input type="file" accept="image/*" id="note-photo-input-library" style="display:none;">
      </div>

      <div class="pos-primary-actions">
        <button class="save-pos-btn" onclick="saveCurrentPosition()">💾 Speichern</button>
        <button class="next-pos-btn" onclick="goToNextOrCreatePosition()">Nächste Position →</button>
      </div>
      <div class="pos-secondary-actions">
        <button class="pos-secondary-btn" onclick="duplicateCurrentPosition()">📋 Position kopieren</button>
        <button class="pos-secondary-btn danger" onclick="deleteCurrentPosition()">🗑 Löschen</button>
      </div>
    </div>
  `;

  attachPositionHandlers(container);
  initSketchCanvas(sketchUrl);
}

async function goToNextOrCreatePosition() {
  if (state.currentPositionIndex < state.positions.length - 1) {
    nextPosition();
  } else {
    await addPosition();
  }
}

async function duplicateCurrentPosition() {
  const src = state.positions[state.currentPositionIndex];
  if (!src) return;
  showSpinner(true);
  try {
    const srcF = src.fields;
    const maxNum = state.positions.reduce((m, p) => Math.max(m, p.fields['Pos-Nr'] || 0), 0);
    // Fields to copy: most sensible defaults, EXCEPT:
    //  - Punkt 2 Innenpress (komplett)
    //  - Punkt 3.1 Rollladendeckel B (nur Breite, Tiefe kann bleiben)
    //  - Punkt 6 Außenpress (komplett)
    //  - Attachments (Skizze, Notiz-Foto) and Pos-Nr
    const copyFields = [
      'Kundenposition', 'Stockwerk',
      'Rolladen',
      // 'Innenpress B', 'Innenpress H',   // ← nicht kopieren (Punkt 2)
      // 'Rollladendeckel B',              // ← nicht kopieren (Punkt 3.1)
      'Rollladendeckel T',
      'Versatz Innen-Innen', 'Versatz Innen-Außen', 'Versatz Differenz',
      // 'Außenpress B', 'Außenpress H',   // ← nicht kopieren (Punkt 6)
      'Nutmaß', 'Einstand', 'Nutmaß Gesamt',
      'Beschlagsart',
      'Öffnungsrichtung',
      'Ornamentglas',
      'Bedienung Typ', 'Bedienung Seite', 'Bedienung Notiz',
      'Insektenschutz', 'Insektenschutz Notiz',
      'Notizen'
    ];
    const newFields = {
      'Pos-Nr': maxNum + 1,
      'Aufmaß': [state.currentProject]
    };
    for (const key of copyFields) {
      const v = srcF[key];
      if (v != null && v !== '') {
        newFields[key] = coerceValue(T_POSITIONEN, key, v);
      }
    }
    const rec = await createRecord(T_POSITIONEN, newFields);
    state.positions.push(rec);
    state.positions.sort((a, b) => (a.fields['Pos-Nr'] || 0) - (b.fields['Pos-Nr'] || 0));
    state.currentPositionIndex = state.positions.findIndex(p => p.id === rec.id);
    renderPositions();
    scrollToTop();
    toast('Position kopiert', 'success');
  } catch (e) {
    dbg(`Duplicate failed: ${e.message}`, 'error');
    toast('Kopieren fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

/* Position-specific helpers — robust numeric parsing */
function toNum(v) {
  if (v == null || v === '') return null;
  const n = typeof v === 'number' ? v : Number(String(v).replace(',', '.'));
  return isNaN(n) ? null : n;
}
function computeDifferenz(a, b) {
  const x = toNum(a), y = toNum(b);
  if (x == null || y == null) return null;
  return x - y;
}
function computeGesamt(a, b) {
  const x = toNum(a), y = toNum(b);
  if (x == null || y == null) return null;
  return x + y;
}
function formatDifferenz(d) {
  if (d == null || isNaN(d)) return '—';
  if (d === 0) return 'gleich';
  if (d > 0) return `außen ${d} höher`;
  return `außen ${Math.abs(d)} tiefer`;
}

function attachPositionHandlers(container) {
  container.querySelectorAll('input[data-key], select[data-key], textarea[data-key]').forEach(el => {
    // Skip disabled fields - no save events for them
    if (el.disabled) return;
    const evt = (el.tagName === 'SELECT') ? 'change' : 'blur';
    el.addEventListener(evt, () => handlePositionFieldChange(el, container));
  });

  // Toggle-bool groups (Rolladen, Ornamentglas)
  container.querySelectorAll('.toggle-group[data-toggle-bool]').forEach(group => {
    const key = group.dataset.key;
    if (!key) return;
    group.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.addEventListener('click', async () => {
        const newVal = opt.dataset.val === 'true';
        group.querySelectorAll('.toggle-opt').forEach(o => o.classList.toggle('active', o === opt));
        await saveField('position', key, newVal);
        // If Rolladen changed, re-render form so sections 4/5/13 enable/disable
        if (key === 'Rolladen') {
          renderPositionForm();
        }
      });
    });
  });

  // Note photo upload — camera input (take photo)
  const photoInput = container.querySelector('#note-photo-input');
  if (photoInput) {
    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await uploadNotePhoto(file);
      e.target.value = ''; // reset so same file can be picked again
    });
  }
  // Note photo upload — library input (pick from photos)
  const photoInputLib = container.querySelector('#note-photo-input-library');
  if (photoInputLib) {
    photoInputLib.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await uploadNotePhoto(file);
      e.target.value = '';
    });
  }
  const photoRemoveBtn = container.querySelector('#note-photo-remove-btn');
  if (photoRemoveBtn) {
    photoRemoveBtn.addEventListener('click', async () => {
      const ok = await confirmDialog('Foto entfernen?', 'Das angehängte Notiz-Foto wird gelöscht.', 'Entfernen');
      if (!ok) return;
      await saveField('position', 'Notiz-Foto', []);
      renderPositionForm();
    });
  }
}

async function uploadNotePhoto(file) {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  showSpinner(true);
  try {
    const base64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
    const url = `https://content.airtable.com/v0/${AIRTABLE_BASE_ID}/${pos.id}/${encodeURIComponent('Notiz-Foto')}/uploadAttachment`;
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contentType: file.type || 'image/jpeg',
        file: base64,
        filename: file.name || `foto-pos${pos.fields['Pos-Nr'] || ''}-${Date.now()}.jpg`
      })
    });
    if (!res.ok) {
      const err = await res.text();
      dbg(`Note photo upload: ${err}`, 'error');
      throw new Error('Upload fehlgeschlagen');
    }
    const data = await res.json();
    pos.fields = { ...pos.fields, ...(data.fields || {}) };
    toast('Foto gespeichert', 'success');
    renderPositionForm();
  } catch (e) {
    toast('Foto-Upload fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

async function handlePositionFieldChange(el, container) {
  const key = el.dataset.key;
  let val = el.value;
  if (el.type === 'number') val = val === '' ? null : Number(val);
  else if (val === '') val = null;
  await saveField('position', key, val);

  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;

  // Computed fields: silent save (don't toast error if these optional fields fail)
  if (key === 'Versatz Innen-Innen' || key === 'Versatz Innen-Außen') {
    const ii = pos.fields['Versatz Innen-Innen'];
    const ia = pos.fields['Versatz Innen-Außen'];
    const diff = computeDifferenz(ii, ia);
    const disp = document.getElementById('versatz-diff-display');
    if (disp) disp.textContent = formatDifferenz(diff);
    await saveFieldSilent('position', 'Versatz Differenz', diff);
  }
  if (key === 'Nutmaß' || key === 'Einstand') {
    const n = pos.fields['Nutmaß'];
    const e = pos.fields['Einstand'];
    const g = computeGesamt(n, e);
    const disp = document.getElementById('nutmass-gesamt-display');
    if (disp) disp.textContent = g != null ? g : '—';
    await saveFieldSilent('position', 'Nutmaß Gesamt', g);
  }
  if (key === 'Innenpress B') {
    const rollInput = container.querySelector('input[data-key="Rollladendeckel B"]');
    const currentRoll = pos.fields['Rollladendeckel B'];
    if (rollInput && (currentRoll == null || currentRoll === '')) {
      const newDefault = val != null ? Number(val) + 15 : null;
      if (newDefault != null) {
        rollInput.value = newDefault;
        await saveFieldSilent('position', 'Rollladendeckel B', newDefault);
      } else {
        rollInput.placeholder = '';
      }
    } else if (rollInput) {
      rollInput.placeholder = val != null ? Number(val) + 15 : '';
    }
  }
}

/* Explicit "save now" — forces any focused input to blur (triggering auto-save),
   then shows confirmation toast. All fields already auto-save on blur; this button
   is for users who want explicit confirmation. */
async function saveCurrentPosition() {
  // Blur the active element if it's inside the position form
  const active = document.activeElement;
  if (active && active.blur && active !== document.body) {
    active.blur();
  }
  // Small delay so blur event handlers (field auto-saves) can run first
  await new Promise(r => setTimeout(r, 150));
  toast('Position gespeichert', 'success');
}
async function saveFieldSilent(prefix, key, value) {
  let table, recordId, localRecord;
  if (prefix === 'position') {
    const pos = state.positions[state.currentPositionIndex];
    if (!pos) return;
    table = T_POSITIONEN;
    recordId = pos.id;
    localRecord = pos;
  } else return;
  const oldVal = localRecord.fields[key];
  if (value == null) delete localRecord.fields[key];
  else localRecord.fields[key] = value;
  const coerced = coerceValue(table, key, value);
  try {
    const payload = {}; payload[key] = coerced;
    const updated = await updateRecord(table, recordId, payload);
    if (updated && updated.fields) {
      localRecord.fields = { ...localRecord.fields, ...updated.fields };
    }
    if (value == null) delete localRecord.fields[key];
  } catch (e) {
    if (oldVal === undefined) delete localRecord.fields[key];
    else localRecord.fields[key] = oldVal;
    dbg(`Silent save failed: ${key}: ${e.message}`, 'error');
    // no toast — computed fields failing shouldn't alarm the user
  }
}

async function deleteCurrentPosition() {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  const num = pos.fields['Pos-Nr'] || (state.currentPositionIndex + 1);
  const ok = await confirmDialog('Position löschen?', `Position ${num} wird endgültig aus Airtable entfernt.`);
  if (!ok) return;
  showSpinner(true);
  try {
    await deleteRecord(T_POSITIONEN, pos.id);
    state.positions.splice(state.currentPositionIndex, 1);
    if (state.currentPositionIndex >= state.positions.length) {
      state.currentPositionIndex = Math.max(0, state.positions.length - 1);
    }
    toast('Position gelöscht', 'success');
    renderPositions();
  } catch (e) {
    toast('Löschen fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

/* =============================================================
   SKETCH CANVAS — Pencil-only, collapsible
============================================================= */
let sketchCtx = null;
let sketchDrawing = false;
let sketchInitialized = false;
let sketchMode = 'pen'; // 'pen' = only Apple Pencil, 'any' = finger+pen
let sketchPendingUrl = null; // URL of existing sketch to load when panel opens

function initSketchCanvas(existingUrl) {
  // Don't init canvas immediately — only store the URL and wait for user to expand the panel
  sketchPendingUrl = existingUrl || null;
  sketchInitialized = false;
  sketchCtx = null;
  // If panel was already open (user navigated within positions), hide it first so user
  // consciously re-opens it for the new position
  const panel = document.getElementById('sketch-panel');
  const icon = document.getElementById('sketch-toggle-icon');
  if (panel) panel.style.display = 'none';
  if (icon) icon.textContent = '▸';
}

function toggleSketchPanel() {
  const panel = document.getElementById('sketch-panel');
  const icon = document.getElementById('sketch-toggle-icon');
  const label = document.getElementById('sketch-toggle-label');
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    panel.style.display = 'none';
    if (icon) icon.textContent = '▸';
  } else {
    panel.style.display = 'block';
    if (icon) icon.textContent = '▾';
    if (label) label.textContent = 'Skizze bearbeiten';
    // Init the canvas now (first time panel is opened for this position)
    if (!sketchInitialized) {
      setTimeout(() => doInitCanvas(sketchPendingUrl), 50); // small delay so canvas has layout
    }
  }
}

function doInitCanvas(existingUrl) {
  const canvas = document.getElementById('sketch-canvas');
  if (!canvas) return;
  sketchCtx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  sketchCtx.scale(dpr, dpr);
  sketchCtx.lineWidth = 2.2;
  sketchCtx.lineCap = 'round';
  sketchCtx.lineJoin = 'round';
  sketchCtx.strokeStyle = '#1c1c1e';
  sketchCtx.fillStyle = '#ffffff';
  sketchCtx.fillRect(0, 0, rect.width, rect.height);

  if (existingUrl) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => sketchCtx.drawImage(img, 0, 0, rect.width, rect.height);
    img.onerror = () => {};
    img.src = existingUrl;
  }

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  };

  // Check if the pointer event should be accepted based on mode
  const shouldDraw = (e) => {
    if (sketchMode === 'pen') {
      return e.pointerType === 'pen';
    }
    return true; // 'any' mode
  };

  // Block page scroll while actively drawing (esp. iPad Apple Pencil)
  let prevBodyOverflow = '';
  let prevBodyTouchAction = '';
  const lockScroll = () => {
    prevBodyOverflow = document.body.style.overflow;
    prevBodyTouchAction = document.body.style.touchAction;
    document.body.style.overflow = 'hidden';
    document.body.style.touchAction = 'none';
  };
  const unlockScroll = () => {
    document.body.style.overflow = prevBodyOverflow || '';
    document.body.style.touchAction = prevBodyTouchAction || '';
  };

  const start = (e) => {
    if (!shouldDraw(e)) return;
    e.preventDefault();
    e.stopPropagation();
    lockScroll();
    sketchDrawing = true;
    try { canvas.setPointerCapture(e.pointerId); } catch {}
    const p = getPos(e);
    sketchCtx.beginPath();
    sketchCtx.moveTo(p.x, p.y);
    // draw a dot in case of single tap
    sketchCtx.lineTo(p.x + 0.01, p.y + 0.01);
    sketchCtx.stroke();
  };
  const move = (e) => {
    if (!sketchDrawing) return;
    if (!shouldDraw(e)) return;
    e.preventDefault();
    const p = getPos(e);
    sketchCtx.lineTo(p.x, p.y);
    sketchCtx.stroke();
  };
  const end = (e) => {
    if (sketchDrawing) {
      sketchDrawing = false;
      unlockScroll();
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
    }
  };

  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointercancel', end);
  canvas.addEventListener('pointerleave', end);

  // Prevent native touch scroll/gestures from firing on the canvas itself
  canvas.addEventListener('touchstart', (e) => {
    if (sketchMode === 'any') e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    if (sketchDrawing) e.preventDefault();
  }, { passive: false });

  // Mode toggle
  document.querySelectorAll('input[name="sketch-mode"]').forEach(radio => {
    radio.addEventListener('change', (ev) => {
      sketchMode = ev.target.value;
      // pen-mode: touch-action auto so finger scrolls, pen still draws via pointerType check
      // any-mode: touch-action none so finger draws without triggering scroll
      canvas.style.touchAction = sketchMode === 'pen' ? 'pan-y' : 'none';
    });
  });
  canvas.style.touchAction = sketchMode === 'pen' ? 'pan-y' : 'none';

  // Clear = erase drawing surface (but don't delete from Airtable)
  document.getElementById('sketch-clear-btn').onclick = () => {
    const r = canvas.getBoundingClientRect();
    sketchCtx.fillStyle = '#ffffff';
    sketchCtx.fillRect(0, 0, r.width, r.height);
  };

  // Save = upload current canvas as new attachment
  document.getElementById('sketch-save-btn').onclick = saveSketch;

  // Delete = remove attachment from Airtable, clear canvas, keep panel open + editable
  const delBtn = document.getElementById('sketch-delete-btn');
  if (delBtn) {
    delBtn.onclick = async () => {
      const pos = state.positions[state.currentPositionIndex];
      if (!pos) return;
      const hasAny = Array.isArray(pos.fields['Skizze']) && pos.fields['Skizze'].length > 0;
      if (!hasAny) {
        // Nothing saved yet → just clear canvas
        const r = canvas.getBoundingClientRect();
        sketchCtx.fillStyle = '#ffffff';
        sketchCtx.fillRect(0, 0, r.width, r.height);
        return;
      }
      const ok = await confirmDialog('Skizze entfernen?', 'Die gespeicherte Skizze wird gelöscht.', 'Entfernen');
      if (!ok) return;
      try {
        await saveField('position', 'Skizze', []);
        // Clear the canvas in place — don't re-render the whole form
        const r = canvas.getBoundingClientRect();
        sketchCtx.fillStyle = '#ffffff';
        sketchCtx.fillRect(0, 0, r.width, r.height);
        sketchPendingUrl = null;
        // Hide the "vorhanden" badge and collapsed preview by re-rendering the form header later;
        // but keep the panel open so user can immediately draw a new sketch
        const badge = document.querySelector('.sketch-toggle-badge');
        if (badge) badge.remove();
        const preview = document.querySelector('.sketch-collapsed-preview');
        if (preview) preview.remove();
        const label = document.getElementById('sketch-toggle-label');
        if (label) label.textContent = 'Skizze zeichnen';
        toast('Skizze entfernt', 'success');
      } catch (e) {
        toast('Entfernen fehlgeschlagen', 'error');
      }
    };
  }

  sketchInitialized = true;
}

async function saveSketch() {
  const canvas = document.getElementById('sketch-canvas');
  if (!canvas) return;
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  showSpinner(true);
  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const base64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
    const url = `https://content.airtable.com/v0/${AIRTABLE_BASE_ID}/${pos.id}/${encodeURIComponent('Skizze')}/uploadAttachment`;
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contentType: 'image/png',
        file: base64,
        filename: `skizze-pos${pos.fields['Pos-Nr'] || ''}-${Date.now()}.png`
      })
    });
    if (!res.ok) {
      const err = await res.text();
      dbg(`Sketch upload: ${err}`, 'error');
      throw new Error('Upload fehlgeschlagen');
    }
    const data = await res.json();
    // Merge, don't overwrite — Airtable only returns populated fields
    if (data && data.fields) {
      pos.fields = { ...pos.fields, ...data.fields };
    }
    toast('Skizze gespeichert', 'success');
    // Update the toggle button state to show "vorhanden" badge without re-rendering
    // the whole position form (which would close the panel and lose the canvas state)
    const label = document.getElementById('sketch-toggle-label');
    if (label) label.textContent = 'Skizze bearbeiten';
    const toggleBtn = document.getElementById('sketch-toggle-btn');
    if (toggleBtn && !toggleBtn.querySelector('.sketch-toggle-badge')) {
      const badge = document.createElement('span');
      badge.className = 'sketch-toggle-badge';
      badge.textContent = 'vorhanden';
      toggleBtn.appendChild(badge);
    }
    // Canvas stays editable — user can continue drawing, clear, delete, or save again
  } catch (e) {
    toast('Skizze speichern fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

async function deleteRecord(table, id) {
  const res = await fetch(`${AIRTABLE_URL}/${encodeTable(table)}/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${AIRTABLE_API_KEY}` }
  });
  if (!res.ok) { const err = await res.text(); dbg(`Delete: ${err}`, 'error'); throw new Error('Delete fehlgeschlagen'); }
  return true;
}

function renderPositionNav() {
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  const counter = document.getElementById('nav-counter');
  const total = state.positions.length;
  const idx = state.currentPositionIndex;
  if (total === 0) {
    counter.textContent = 'Keine Pos.';
    prev.disabled = true; next.disabled = true;
    return;
  }
  counter.textContent = `Pos ${idx + 1} von ${total}`;
  prev.disabled = idx === 0;
  next.disabled = idx === total - 1;
}

function goToPosition(i) {
  if (i < 0 || i >= state.positions.length) return;
  state.currentPositionIndex = i;
  renderPositions();
  scrollToTop();
}
function prevPosition() { goToPosition(state.currentPositionIndex - 1); }
function nextPosition() { goToPosition(state.currentPositionIndex + 1); }

function scrollToTop() {
  // Scroll window and any scrollable ancestor to the top so the new position
  // is shown from the beginning. Instant scroll (not smooth) for reliability on iOS.
  try {
    window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
  } catch {
    window.scrollTo(0, 0);
  }
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
}

async function addPosition() {
  showSpinner(true);
  try {
    const maxNum = state.positions.reduce((m, p) => Math.max(m, p.fields['Pos-Nr'] || 0), 0);
    const rec = await createRecord(T_POSITIONEN, {
      'Pos-Nr': maxNum + 1,
      'Aufmaß': [state.currentProject]
    });
    state.positions.push(rec);
    state.positions.sort((a, b) => (a.fields['Pos-Nr'] || 0) - (b.fields['Pos-Nr'] || 0));
    state.currentPositionIndex = state.positions.findIndex(p => p.id === rec.id);
    renderPositions();
    scrollToTop();
    toast('Position hinzugefügt', 'success');
  } catch (e) {
    toast('Fehler beim Anlegen', 'error');
  } finally {
    showSpinner(false);
  }
}

/* =============================================================
   FIELD RENDERING (shared)
============================================================= */
function renderFields(defs, values, prefix) {
  let html = '';
  let rowBuffer = null;
  for (const def of defs) {
    if (def.section) {
      if (rowBuffer) { html += closeRow(rowBuffer); rowBuffer = null; }
      html += `<div class="section-title">${def.section}</div>`;
      continue;
    }
    const v = values[def.key];
    const fieldHtml = renderField(def, v, prefix);
    if (def.row) {
      if (!rowBuffer) rowBuffer = { row: def.row, html: '' };
      if (rowBuffer.row !== def.row) {
        html += closeRow(rowBuffer);
        rowBuffer = { row: def.row, html: '' };
      }
      rowBuffer.html += fieldHtml;
    } else {
      if (rowBuffer) { html += closeRow(rowBuffer); rowBuffer = null; }
      html += fieldHtml;
    }
  }
  if (rowBuffer) html += closeRow(rowBuffer);
  return html;
}
function closeRow(buf) {
  // PLZ + Ort layout: schmale PLZ, breiter Ort
  if (buf.row && buf.row.endsWith('-ort')) {
    return `<div style="display:grid;grid-template-columns:1fr 2fr;gap:10px;">${buf.html}</div>`;
  }
  return `<div class="field-row">${buf.html}</div>`;
}

function renderField(def, value, prefix) {
  const id = `${prefix}-${def.key.replace(/[^a-z0-9]/gi,'_')}`;
  const ro = def.readonly ? 'readonly' : '';
  if (def.type === 'text' || def.type === 'tel' || def.type === 'email') {
    return `<div class="field">
      <label>${def.label}</label>
      <input type="${def.type}" id="${id}" data-key="${def.key}" value="${escapeHtml(value || '')}" ${ro}>
    </div>`;
  }
  if (def.type === 'number') {
    return `<div class="field">
      <label>${def.label}</label>
      <input type="number" inputmode="decimal" id="${id}" data-key="${def.key}" value="${value == null ? '' : value}" ${ro}>
    </div>`;
  }
  if (def.type === 'date') {
    return `<div class="field">
      <label>${def.label}</label>
      <input type="date" id="${id}" data-key="${def.key}" value="${value || ''}">
    </div>`;
  }
  if (def.type === 'textarea') {
    return `<div class="field">
      <label>${def.label}</label>
      <textarea id="${id}" data-key="${def.key}">${escapeHtml(value || '')}</textarea>
    </div>`;
  }
  if (def.type === 'select') {
    const opts = ['<option value="">—</option>'].concat(
      def.options.map(o => `<option value="${escapeHtml(o)}" ${value === o ? 'selected' : ''}>${escapeHtml(o)}</option>`)
    ).join('');
    return `<div class="field">
      <label>${def.label}</label>
      <select id="${id}" data-key="${def.key}">${opts}</select>
    </div>`;
  }
  if (def.type === 'multi') {
    const vals = Array.isArray(value) ? value : [];
    const chips = def.options.map(o =>
      `<button type="button" class="chip ${vals.includes(o) ? 'active' : ''}" data-key="${def.key}" data-val="${escapeHtml(o)}" data-multi="1">${escapeHtml(o)}</button>`
    ).join('');
    return `<div class="field">
      <label>${def.label}</label>
      <div class="chip-group">${chips}</div>
    </div>`;
  }
  if (def.type === 'photo') {
    const hasPhoto = Array.isArray(value) && value.length > 0;
    const url = hasPhoto ? value[0].url : '';
    return `<div class="field">
      <label>${def.label}</label>
      ${hasPhoto
        ? `<img src="${url}" class="photo-preview" alt="Skizze">`
        : `<label class="photo-zone" for="${id}">📷 Foto aufnehmen oder wählen</label>`
      }
      <input type="file" accept="image/*" capture="environment" id="${id}" data-key="${def.key}" data-photo="1" style="display:none;">
    </div>`;
  }
  if (def.type === 'toggle-bool') {
    const v = !!value;
    return `<div class="field">
      <label>${def.label}</label>
      <div class="toggle-group" data-key="${def.key}" data-toggle-bool="1">
        <div class="toggle-opt ${!v?'active':''}" data-val="false">Nein</div>
        <div class="toggle-opt ${v?'active':''}" data-val="true">Ja</div>
      </div>
    </div>`;
  }
  if (def.type === 'toggle-enum') {
    return `<div class="field">
      <label>${def.label}</label>
      <div class="toggle-group" data-key="${def.key}" data-toggle-enum="1">
        ${def.options.map(o => `<div class="toggle-opt ${value===o?'active':''}" data-val="${escapeHtml(o)}">${escapeHtml(o)}</div>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function attachFieldHandlers(container, prefix) {
  // text, number, date, textarea, select
  container.querySelectorAll('input[data-key], select[data-key], textarea[data-key]').forEach(el => {
    if (el.dataset.multi || el.dataset.photo) return;
    if (el.readOnly) return;
    el.addEventListener('blur', () => handleFieldChange(prefix, el));
    if (el.tagName === 'SELECT' || el.type === 'date') {
      el.addEventListener('change', () => handleFieldChange(prefix, el));
    }
  });
  // multi chips
  container.querySelectorAll('.chip[data-multi]').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
      const key = chip.dataset.key;
      const siblings = container.querySelectorAll(`.chip[data-key="${CSS.escape(key)}"]`);
      const values = Array.from(siblings).filter(c => c.classList.contains('active')).map(c => c.dataset.val);
      saveField(prefix, key, values.length ? values : null);
    });
  });
  // toggle-bool
  container.querySelectorAll('.toggle-group[data-toggle-bool]').forEach(tg => {
    const key = tg.dataset.key;
    tg.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.addEventListener('click', async () => {
        const val = opt.dataset.val === 'true';
        tg.querySelectorAll('.toggle-opt').forEach(o => o.classList.toggle('active', o === opt));
        await saveField(prefix, key, val);
        // Re-render baustelle to swap readonly state
        if (prefix === 'baustelle') renderBaustelle();
        if (prefix === 'fenster') renderFenster();
      });
    });
  });
  // toggle-enum
  container.querySelectorAll('.toggle-group[data-toggle-enum]').forEach(tg => {
    const key = tg.dataset.key;
    tg.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.addEventListener('click', async () => {
        const val = opt.dataset.val;
        tg.querySelectorAll('.toggle-opt').forEach(o => o.classList.toggle('active', o === opt));
        await saveField(prefix, key, val);
        if (prefix === 'fenster') renderFenster();
      });
    });
  });
  // photo
  container.querySelectorAll('input[data-photo]').forEach(el => {
    el.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await handlePhotoUpload(prefix, el.dataset.key, file);
    });
  });
}

function handleFieldChange(prefix, el) {
  const key = el.dataset.key;
  let val = el.value;
  if (el.type === 'number') {
    val = val === '' ? null : Number(val);
  } else if (val === '') {
    val = null;
  }
  saveField(prefix, key, val);
}

async function saveField(prefix, key, value) {
  let table, recordId, localRecord;
  if (prefix === 'position') {
    table = T_POSITIONEN;
    const pos = state.positions[state.currentPositionIndex];
    if (!pos) return;
    recordId = pos.id;
    localRecord = pos;
  } else if (prefix === 'baustelle') {
    table = T_AUFMASS;
    recordId = state.currentProjectRecord.id;
    localRecord = state.currentProjectRecord;
  } else if (prefix === 'technik' || prefix === 'fenster') {
    table = T_TECHNIK;
    if (!state.techInfo) return;
    recordId = state.techInfo.id;
    localRecord = state.techInfo;
  }

  // optimistic local update
  const oldVal = localRecord.fields[key];
  if (value == null) delete localRecord.fields[key];
  else localRecord.fields[key] = value;

  // Coerce value to match Airtable field type (e.g. Nutmaß might be text, not number)
  const coerced = coerceValue(table, key, value);

  async function tryUpdate(payloadValue) {
    const payload = {};
    payload[key] = payloadValue;
    return await updateRecord(table, recordId, payload);
  }

  try {
    let updated;
    try {
      updated = await tryUpdate(coerced);
    } catch (firstErr) {
      // Type mismatch / select-option mismatch fallback
      const msg = String(firstErr.message || '');
      const is422 = msg.includes('INVALID_VALUE_FOR_COLUMN') || msg.includes('INVALID_MULTIPLE_CHOICE_OPTIONS') || msg.includes('422');
      if (is422) {
        dbg(`Retry "${key}" with conversion: ${msg}`, 'info');
        // Try multiple alternatives in sequence
        const alternatives = [];
        if (typeof value === 'string' && value.length > 0) {
          // Case variants for select options (Links -> links etc.)
          alternatives.push(value.toLowerCase());
          alternatives.push(value.charAt(0).toUpperCase() + value.slice(1).toLowerCase());
          // Numeric string -> number
          if (/^-?\d+([.,]\d+)?$/.test(value)) alternatives.push(Number(value.replace(',', '.')));
        } else if (typeof value === 'number') {
          alternatives.push(String(value));
        } else if (value == null) {
          alternatives.push('');
        }
        let saved = false;
        for (const alt of alternatives) {
          if (alt === value) continue;
          try {
            updated = await tryUpdate(alt);
            dbg(`✓ "${key}" gespeichert als "${alt}"`, 'ok');
            // update local value to match what was actually saved
            localRecord.fields[key] = alt;
            saved = true;
            break;
          } catch (e2) { /* try next */ }
        }
        if (!saved) throw firstErr;
      } else {
        throw firstErr;
      }
    }

    // Merge server response into local — do NOT replace whole fields object,
    // because Airtable only returns populated fields, which would wipe other values
    if (updated && updated.fields) {
      localRecord.fields = { ...localRecord.fields, ...updated.fields };
    }
    if (value == null) delete localRecord.fields[key];
    showSaveIndicator();
    if (prefix === 'position' && (key === 'Pos-Nr' || key === 'Kundenposition')) {
      renderPills();
    }
  } catch (e) {
    // rollback
    if (oldVal === undefined) delete localRecord.fields[key];
    else localRecord.fields[key] = oldVal;
    const detail = String(e.message || e).split(':').slice(1).join(':').trim().slice(0, 80);
    toast(`Speichern "${key}" fehlgeschlagen${detail ? ': ' + detail : ''}`, 'error');
    dbg(`Save "${key}" failed: ${e.message}`, 'error');
  }
}

async function handlePhotoUpload(prefix, key, file) {
  // Airtable attachments need a public URL. We use base64 data URL (works for small files via content API? No).
  // Airtable requires a URL for attachments. Workaround: upload via Airtable's attachments-content endpoint.
  showSpinner(true);
  try {
    const base64 = await fileToBase64(file);
    // Use new Airtable content upload endpoint
    let recordId;
    if (prefix === 'position') recordId = state.positions[state.currentPositionIndex].id;
    const url = `https://content.airtable.com/v0/${AIRTABLE_BASE_ID}/${recordId}/${encodeURIComponent(key)}/uploadAttachment`;
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contentType: file.type,
        file: base64,
        filename: file.name || `skizze-${Date.now()}.jpg`
      })
    });
    if (!res.ok) throw new Error('Upload fehlgeschlagen');
    const data = await res.json();
    // update local record
    if (prefix === 'position') {
      state.positions[state.currentPositionIndex].fields = data.fields || state.positions[state.currentPositionIndex].fields;
    }
    renderPositionForm();
    toast('Foto hochgeladen', 'success');
  } catch (e) {
    console.error(e);
    toast('Upload fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const res = r.result;
      const base64 = res.split(',')[1];
      resolve(base64);
    };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

      <div class="field"><label>Farbe</label><input type="text" data-key="${prefix} Raff Farbe" value="${escapeHtml(f[`${prefix} Raff Farbe`]||'')}"></div>
      <div class="field"><label>Endstab</label><input type="text" data-key="${prefix} Raff Endstab" value="${escapeHtml(f[`${prefix} Raff Endstab`]||'')}"></div>
      <div class="field"><label>Kasten</label><input type="text" data-key="${prefix} Raff Kasten" value="${escapeHtml(f[`${prefix} Raff Kasten`]||'')}"></div>
    `;
    if (prefix === 'VB') {
      raffFields += `<div class="field"><label>Intego</label><input type="text" data-key="VB Raff Intego" value="${escapeHtml(f['VB Raff Intego']||'')}"></div>`;
    }
  }

  const showBedienung = rollActive || raffActive;

  return `
    <div class="besch-sub">
      <div class="besch-sub-title">Rollladen</div>
      <div class="field">
        <div class="toggle-group" data-key="${rollKey}" data-toggle-bool="1">

          <div class="toggle-opt ${rollActive?'active':''}" data-val="true">Ja</div>
        </div>
      </div>
      ${rollFields}
    </div>
    <div class="besch-sub">
      <div class="besch-sub-title">Raffstore</div>
      <div class="field">
        <div class="toggle-group" data-key="${raffKey}" data-toggle-bool="1">
          <div class="toggle-opt ${!raffActive?'active':''}" data-val="false">Nein</div>
          <div class="toggle-opt ${raffActive?'active':''}" data-val="true">Ja</div>
        </div>
      </div>
      ${raffFields}
    </div>
    ${showBedienung ? `
      <div class="besch-sub">
        <div class="besch-sub-title">Bedienung</div>
        <div class="field">
          <select data-key="${bedKey}">
            <option value="">—</option>
            ${BEDIENUNG_TYP_OPTIONS.map(o => `<option value="${o}" ${f[bedKey]===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
      </div>
    ` : ''}
  `;
}

/* =============================================================
   PDF EXPORT (window.print)
   iPad Safari is picky about window.print() — it requires a direct
   user gesture. We build the print area, wait for images, then show
   a confirmation overlay that triggers window.print() synchronously
   from a real click.
============================================================= */
async function printProject() {
  if (!state.currentProjectRecord) { toast('Kein Projekt geladen', 'error'); return; }
  await triggerPrint(() => buildPrintArea(), 'Gesamtaufmaß');
}

async function printOverview() {
  if (!state.currentProjectRecord) { toast('Kein Projekt geladen', 'error'); return; }
  await triggerPrint(() => buildOverviewPrintArea(), 'Übersicht');
}

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

async function triggerPrint(builderFn, label) {
  showSpinner(true);
  try {
    builderFn();
    // Wait for all images in print-area to load
    const imgs = Array.from(document.querySelectorAll('#print-area img'));
    await Promise.all(imgs.map(img => {
      if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
      return new Promise(resolve => {
        img.addEventListener('load', resolve, { once: true });
        img.addEventListener('error', resolve, { once: true });
        setTimeout(resolve, 5000);
      });
    }));
  } finally {
    showSpinner(false);
  }

  // On iOS Safari, window.print() after async work often fails silently.
  // Show a confirmation overlay with a button that triggers print via direct user gesture.
  if (isIOS()) {
    showPrintConfirm(label);
  } else {
    // Desktop: direct print
    setTimeout(() => window.print(), 150);
  }
}

function showPrintConfirm(label) {
  // Remove any existing overlay
  const old = document.getElementById('print-confirm-overlay');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'print-confirm-overlay';
  overlay.className = 'print-confirm-overlay';
  overlay.innerHTML = `
    <div class="print-confirm-modal">
      <div class="print-confirm-icon">📄</div>
      <h3>PDF bereit</h3>
      <p>${escapeHtml(label || 'Dokument')} wurde vorbereitet.<br>Tippe auf „Drucken", um den Druckdialog zu öffnen.</p>
      <div class="print-confirm-actions">
        <button class="print-confirm-btn cancel" id="print-confirm-cancel">Abbrechen</button>
        <button class="print-confirm-btn primary" id="print-confirm-ok">Drucken</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  document.getElementById('print-confirm-cancel').addEventListener('click', () => {
    overlay.remove();
  });
  document.getElementById('print-confirm-ok').addEventListener('click', () => {
    overlay.remove();
    // This is a direct user gesture → window.print() works reliably on iOS Safari
    window.print();
  });
}

function buildPrintArea() {

  const footerHtml = (pageInfo) => `<div class="pp-footer">${escapeHtml(projectName)} · ${pageInfo} · ${today}</div>`;

  };
  const rowMulti = (label, value) => {
    if (!Array.isArray(value) || value.length === 0) return '';
    return row(label, value.join(', '));
  };
  const block = (label, value) => {
    if (!value) return '';
    return `<div class="pp-block"><div class="pp-label">${escapeHtml(label)}</div><div class="pp-value">${escapeHtml(value)}</div></div>`;
  };
  // Wrap a section: hide completely if all children rows are empty
  const section = (title, contentHtml) => {
    if (!contentHtml || !contentHtml.trim()) return '';
    return `<div class="pp-section"><div class="pp-section-title">${escapeHtml(title)}</div><div class="pp-grid">${contentHtml}</div></div>`;
  };
  const sectionRaw = (title, contentHtml) => {
    if (!contentHtml || !contentHtml.trim()) return '';
    return `<div class="pp-section"><div class="pp-section-title">${escapeHtml(title)}</div>${contentHtml}</div>`;
  };

  const abweichend = !!proj['Baustelle abweichend'];
  const kundeFullName = [proj['Kunde Vorname'], proj['Kunde Name']].filter(Boolean).join(' ');

  let bauName, bauStr, bauPlz, bauOrt, bauTel, bauMail;
  if (abweichend) {
    bauName = proj['Baustelle Name'];
    bauStr = proj['Baustelle Straße'];
    bauPlz = proj['Baustelle PLZ'];
    bauOrt = proj['Baustelle Ort'];
    bauTel = proj['Baustelle Telefon'];
    bauMail = proj['Baustelle Email'];
  } else {
    bauName = kundeFullName;
    bauStr = proj['Kunde Straße'];
    bauPlz = proj['Kunde PLZ'];
    bauOrt = proj['Kunde Ort'];
    bauTel = proj['Kunde Telefon'];
    bauMail = proj['Kunde Email'];
  }

  // ============================================================
  // SEITE 1: FENSTERDETAIL
  // ============================================================
  const renderBeschBlock = (prefix, label, f) => {
    const rollActive = !!f[`${prefix} Rollladen`];
    const raffActive = !!f[`${prefix} Raffstore`];
    // Skip section entirely if neither is active
    if (!rollActive && !raffActive) return '';
    let inner = '';
    if (rollActive) {
      inner += row('Rollladen', 'Ja');
      inner += row('Behang', f[`${prefix} Roll Behang`]);
      inner += row('Farbe', f[`${prefix} Roll Farbe`]);
      inner += row('Endstab', f[`${prefix} Roll Endstab`]);
      if (prefix === 'MW') {
        inner += row('Rollodeckel', f['MW Roll Rollodeckel']);
        inner += row('Kastendämmung', f['MW Roll Kastendämmung']);
        inner += row('DiHa', f['MW Roll DiHa']);
        inner += row('Welle', f['MW Roll Welle']);
      }
      if (prefix === 'VB' || prefix === 'AS') {
        inner += row('Kasten', f[`${prefix} Roll Kasten`]);
      }
      if (prefix === 'VB') {
        inner += row('Intego', f['VB Roll Intego']);
      }
    }
    if (raffActive) {
      inner += row('Raffstore', 'Ja');
      inner += row('Lamellen', f[`${prefix} Raff Lamellen`]);
      inner += row('Farbe', f[`${prefix} Raff Farbe`]);
      inner += row('Endstab', f[`${prefix} Raff Endstab`]);
      inner += row('Kasten', f[`${prefix} Raff Kasten`]);
      if (prefix === 'VB') {
        inner += row('Intego', f['VB Raff Intego']);
      }
    }
    inner += row('Bedienung', f[`${prefix} Bedienung`]);
    return section(label, inner);
  };

  const pageFenster = `
    <div class="pp-page">
      ${headerHtml('Fensterdetails')}

      ${section('Fenster',
        row('Fabrikat', tech['Fenster Fabrikat']) +
        row('System', tech['Fenster System']) +
        row('Farbe außen', tech['Fenster Farbe außen']) +
        row('Farbe innen', tech['Fenster Farbe innen']) +
        row('Dichtungen', tech['Fenster Dichtungen']) +
        row('Entwässerung', tech['Fenster Entwässerung']) +
        row('Fenstergriff', tech['Fenstergriff']) +
        row('Glas', tech['Fenster Glas']) +
        row('Ornament', tech['Fenster Ornament'])
      )}

      ${section('Außenfensterbank',
        row('Status', tech['AFB Status']) +
        row('Ausladung', tech['AFB Ausladung'] != null ? tech['AFB Ausladung'] + ' mm' : null) +
        row('Farbe', tech['AFB Farbe']) +
        row('Endstücke', tech['AFB Endstücke']) +
        row('Stützwinkel', tech['AFB Status'] === 'neu' ? (tech['AFB Stützwinkel'] ? 'Ja' : 'Nein') : null)
      )}

      ${section('Innenfensterbank',
        row('Status', tech['IFB Status']) +
        row('Material', tech['IFB Status'] === 'neu' ? 'Werzalit' : null) +
        row('Dekor', tech['IFB Dekor']) +
        row('Ausladung', tech['IFB Ausladung'] != null ? tech['IFB Ausladung'] + ' mm' : null) +
        row('Endstücke', tech['IFB Endstücke'])
      )}

      ${renderBeschBlock('MW', 'Beschattung — Im Mauerwerk', tech)}
      ${renderBeschBlock('VB', 'Beschattung — Vorbau', tech)}
      ${renderBeschBlock('AS', 'Beschattung — Aufsatz', tech)}

      ${footerHtml('Seite 3 · Fensterdetails')}
    </div>
  `;

  // ============================================================
  // SEITE 1: BAUSTELLE
  // ============================================================
  const pageBaustelle = `
    <div class="pp-page">
      ${headerHtml('Baustelle')}

      ${section('Projekt',
        row('Projektname', proj['Projektname']) +
        row('Datum', proj['Datum'] ? formatDate(proj['Datum']) : null) +
        row('Status', proj['Status']) +
        row('Angebotsnummer', proj['Angebotsnummer']) +
        row('Auftragsnummer', proj['Auftragsnummer']) +
        row('Anzahl Positionen', positions.length || null) +
        row('Verkauf', proj['Verkauf']) +
        row('Technik', proj['Technik'])
      )}

      ${section('Kunde',
        row('Vorname', proj['Kunde Vorname']) +
        row('Name', proj['Kunde Name']) +
        row('Straße', proj['Kunde Straße']) +
        row('PLZ', proj['Kunde PLZ']) +
        row('Ort', proj['Kunde Ort']) +
        row('Telefon', proj['Kunde Telefon']) +
        row('E-Mail', proj['Kunde Email'])
      )}

      ${section(`Baustellenadresse ${abweichend ? '(abweichend)' : '(= Kundenadresse)'}`,
        row('Name', bauName) +
        row('Straße', bauStr) +
        row('PLZ', bauPlz) +
        row('Ort', bauOrt) +
        row('Telefon', bauTel) +
        row('E-Mail', bauMail)
      )}

      ${footerHtml('Seite 1 · Baustelle')}
    </div>
  `;

  // ============================================================
  // SEITE 2: TECHNIK
  // ============================================================
  const technikNotizenHtml = tech['Notizen']
    ? `<div class="pp-block"><div class="pp-value">${escapeHtml(tech['Notizen'])}</div></div>`
    : '';

  const pageTechnik = `
    <div class="pp-page">
      ${headerHtml('Technik')}

      ${section('Auftrag',
        row('Auftragsart', tech['Auftragsart']) +
        rowMulti('Zusatzinfo', tech['Zusatzinfo'])
      )}

      ${section('Montage',
        row('Montageart', tech['Montageart']) +
        row('Anschluss Außen', tech['Anschluss Außen']) +
        row('Anschluss Innen', tech['Anschluss Innen']) +
        row('U-Wert', tech['U-Wert']) +
        row('Meterriss', tech['Meterriss']) +
        row('Fußbodenaufbau', tech['Fußbodenaufbau']) +
        row('Küchenhöhe', tech['Küchenhöhe']) +
        row('Anschlag außen', tech['Anschlag außen'])
      )}

      ${section('Vor- / Nacharbeiten',
        rowMulti('Außen', tech['Vor-Nacharbeiten Außen']) +
        rowMulti('Innen', tech['Vor-Nacharbeiten Innen'])
      )}

      ${section('Logistik',
        row('Parken', tech['Parken']) +
        rowMulti('Stockwerke', tech['Stockwerke']) +
        rowMulti('Transportweg', tech['Transportweg']) +
        row('Gerüst', tech['Gerüst']) +
        row('Kran', tech['Kran'])
      )}

      ${section('Team',
        row('Montage Tage', tech['Montage Tage']) +
        row('Anzahl Monteure', tech['Anzahl Monteure']) +
        row('Wunschmonteur', tech['Wunschmonteur'])
      )}

      ${sectionRaw('Notizen', technikNotizenHtml)}

      ${footerHtml('Seite 2 · Technik')}
    </div>
  `;

  // ============================================================
  // SEITEN 4+: POSITIONEN (eine pro Seite)
  // ============================================================
  const positionsHtml = positions.map((p, i) => {
    const f = p.fields;
    const num = f['Pos-Nr'] || (i + 1);
    const room = f['Kundenposition'] || '';
    const stockwerk = f['Stockwerk'] || '';
    const hasSketch = Array.isArray(f['Skizze']) && f['Skizze'].length > 0;
    const sketchUrl = hasSketch ? f['Skizze'][0].url : '';
    const hasNotePhoto = Array.isArray(f['Notiz-Foto']) && f['Notiz-Foto'].length > 0;
    const notePhotoUrl = hasNotePhoto ? f['Notiz-Foto'][0].url : '';

    const ipB = toNum(f['Innenpress B']);
    const ipH = toNum(f['Innenpress H']);
    const apB = toNum(f['Außenpress B']);
    const apH = toNum(f['Außenpress H']);
    const rdB = toNum(f['Rollladendeckel B']);
    const rdT = toNum(f['Rollladendeckel T']);
    const vii = toNum(f['Versatz Innen-Innen']);
    const via = toNum(f['Versatz Innen-Außen']);
    const nm = toNum(f['Nutmaß']);
    const es = toNum(f['Einstand']);
    const nmGesamtDirekt = toNum(f['Nutmaß Gesamt']);

    const innenpress = (ipB != null && ipH != null) ? `${ipB} × ${ipH} mm` : null;

    const rollDeckel = (rdB != null || rdT != null)
      ? `${rdB != null ? rdB : '–'} × ${rdT != null ? rdT : '–'} mm` : null;

    let differenz = null;
    if (vii != null && via != null) {
      const d = vii - via;
      if (d === 0) differenz = 'gleich';
      else if (d > 0) differenz = `außen ${d} höher`;
      else differenz = `außen ${Math.abs(d)} tiefer`;
    }
    // Nutmaß Gesamt: prefer direct input over computed
    const nutmassGesamt = nmGesamtDirekt != null ? nmGesamtDirekt : ((nm != null && es != null) ? (nm + es) : null);

    const rolladenActive = !!f['Rolladen'];
    const ornamentActive = !!f['Ornamentglas'];
    const bedienungParts = [f['Bedienung Typ'], capitalizeLR(f['Bedienung Seite'])].filter(Boolean).join(' / ');
    const subtitleParts = [room, stockwerk].filter(Boolean).join(' · ');
    const pageNum = 3 + i + 1;

    return `

        <div class="pp-pos-layout">

              row('Kundenposition', room) +
              row('Stockwerk', stockwerk)
            )}

            )}

            )}

            ${rolladenActive ? section('4. Rollladendeckel',
              row('Breite × Tiefe', rollDeckel)

            ${rolladenActive ? section('5. Versatz',
              row('Innen-Innen', vii != null ? vii + ' mm' : null) +
              row('Innen-Außen', via != null ? via + ' mm' : null) +
              row('Differenz', differenz)
            ) : ''}

            ${section('6. Außenpress',
              row('Breite × Höhe', außenpress)
            )}

            ${section('7. Nutmaß',
              row('Nutmaß', nm != null ? nm + ' mm' : null) +
              row('Einstand', es != null ? es + ' mm' : null) +
              row('Gesamt', nutmassGesamt != null ? nutmassGesamt + ' mm' : null)
            )}

            ${section('9. Beschlagsart',
              row('Beschlagsart', f['Beschlagsart'])
            )}

            ${section('10. Öffnung',
              row('Öffnungsrichtung', capitalizeLR(f['Öffnungsrichtung']))
            )}

            ${section('11. Ornamentglas',
              row('Ornamentglas', ornamentActive ? 'Ja' : 'Nein')
            )}

            ${section('12. Bedienung',
              row('Typ / Seite', bedienungParts || null) +
              row('Notiz', f['Bedienung Notiz'])
            )}

            ${rolladenActive ? section('13. Insektenschutz',
              row('Typ', f['Insektenschutz']) +
              row('Notiz', f['Insektenschutz Notiz'])
            ) : ''}
          </div>

          <!-- Rechte Spalte: Skizze + Notizen + Foto -->
          <div class="pp-pos-visual">
            ${hasSketch ? `
              <div class="pp-section">
                <div class="pp-section-title">8. Skizze</div>
                <div class="pp-sketch-box"><img src="${sketchUrl}" alt="Skizze Position ${num}"></div>
              </div>
            ` : ''}

            ${(f['Notizen'] || hasNotePhoto) ? `
              <div class="pp-section">
                <div class="pp-section-title">14. Notizen</div>
                ${f['Notizen'] ? `<div class="pp-block"><div class="pp-value">${escapeHtml(f['Notizen'])}</div></div>` : ''}
                ${hasNotePhoto ? `<div class="pp-note-photo-box"><img src="${notePhotoUrl}" alt="Notiz-Foto Position ${num}"></div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>

        ${footerHtml(`Seite ${pageNum} · Position ${num}`)}
      </div>
    `;
  }).join('');

  // Final assembly — order: Baustelle → Technik → Fenster → Positions
  document.getElementById('print-area').innerHTML = pageBaustelle + pageTechnik + pageFenster + positionsHtml;
}

  const summaryBlock = `

        <div class="ov-summary-body">${fensterSummary || '<span class="ov-empty">—</span>'}</div>
      </div>
    </div>
  `;

  // ============================================================
  // POSITIONS TABLE — one row per position
  // ============================================================
  const tableRows = positions.map((p, i) => {
    const f = p.fields;
    const num = f['Pos-Nr'] || (i + 1);
    const raum = f['Kundenposition'] || '';
    const stockwerk = f['Stockwerk'] || '';
    const ipB = toNum(f['Innenpress B']);
    const ipH = toNum(f['Innenpress H']);
    const apB = toNum(f['Außenpress B']);
    const apH = toNum(f['Außenpress H']);
    const maßeIP = (ipB != null && ipH != null) ? `${ipB}×${ipH}` : '';
    const maßeAP = (apB != null && apH != null) ? `${apB}×${apH}` : '';
    const beschlag = f['Beschlagsart'] || '';
    const richtung = capitalizeLR(f['Öffnungsrichtung']) || '';
    const bedienung = [f['Bedienung Typ'], capitalizeLR(f['Bedienung Seite'])].filter(Boolean).join('/');
    const insekten = f['Insektenschutz'] || '';

    const markers = [];
    if (f['Ornamentglas']) markers.push('Ornament');
    if (!f['Rolladen']) markers.push('kein Rolladen');
    const notizRaw = (f['Notizen'] || '').trim();
    if (notizRaw) markers.push(notizRaw.length > 30 ? notizRaw.substring(0, 28) + '…' : notizRaw);
    const kurzinfo = markers.join(' · ');

    return `
      <tr>
        <td class="ov-td-num">${num}</td>

  const tableBlock = `

============================================================= */
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  if (state.currentTab !== 'positions' || !document.getElementById('screen-project').classList.contains('active')) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (state.currentTab !== 'positions' || !document.getElementById('screen-project').classList.contains('active')) return;
  if (!touchStartX) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const tag = (e.target.tagName || '').toLowerCase();
  if (['input','select','textarea','button','canvas'].includes(tag)) { touchStartX = 0; return; }
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) nextPosition(); else prevPosition();
  }
  touchStartX = 0;
}, { passive: true });

async function metaApi(path, options = {}) {
  const res = await fetch(`https://api.airtable.com/v0/meta/bases/${AIRTABLE_BASE_ID}${path}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    console.error('Meta API error:', res.status, err);
    throw new Error(`Meta ${res.status}: ${err}`);
  }
  return res.json();
}

async function bootstrapSchema() {
  showSpinner(true);
  dbg('Bootstrap gestartet…', 'info');
  try {
    // 1. list existing tables
    dbg('Rufe Base-Schema ab…', 'info');
    const schema = await metaApi('/tables');
    dbg(`Schema geladen: ${schema.tables.length} Tabellen vorhanden`, 'ok');
    const existing = {};
    for (const t of schema.tables) {
      existing[t.name] = t;
      dbg(`  → "${t.name}" (${t.fields.length} Felder)`, 'info');
    }

    const order = [T_AUFMASS, T_TECHNIK, T_POSITIONEN];
    let created = false;

    // 2. create tables
    for (const tableName of order) {
      if (existing[tableName]) {
        dbg(`✓ Tabelle "${tableName}" existiert bereits`, 'ok');
        continue;
      }
      created = true;
      let fields = SCHEMA[tableName].map(f => ({ ...f }));
      dbg(`→ Lege Tabelle "${tableName}" an mit ${fields.length} Feldern…`, 'info');
      try {
        const newTable = await metaApi('/tables', {
          method: 'POST',
          body: JSON.stringify({ name: tableName, fields: fields })
        });
        existing[tableName] = newTable;
        dbg(`✓ "${tableName}" erfolgreich angelegt`, 'ok');
      } catch (err) {
        dbg(`✗ Fehler beim Anlegen von "${tableName}": ${err.message}`, 'error');
        throw err;
      }
    }

    // 2b. Add missing fields to existing tables (für Schema-Updates)
    for (const tableName of order) {
      const table = existing[tableName];
      const existingFieldNames = new Set(table.fields.map(f => f.name));
      const wanted = SCHEMA[tableName];
      for (let i = 0; i < wanted.length; i++) {
        const f = wanted[i];
        if (existingFieldNames.has(f.name)) continue;
        if (i === 0) continue; // skip primary field
        dbg(`→ Feld "${f.name}" → "${tableName}"`, 'info');
        try {
          const newField = await metaApi(`/tables/${table.id}/fields`, {
            method: 'POST',
            body: JSON.stringify(f)
          });
          table.fields.push(newField);
          created = true;
        } catch (err) {
          dbg(`⚠ Feld "${f.name}": ${err.message}`, 'error');
        }
      }
    }

    // 2c. Sync options for existing singleSelect/multipleSelects fields
    // (ergänzt fehlende Choices, damit z.B. "Links/Rechts" neben alten "links/rechts/fest/..." existieren)
    for (const tableName of order) {
      const table = existing[tableName];
      const wanted = SCHEMA[tableName];
      for (const wf of wanted) {
        if (wf.type !== 'singleSelect' && wf.type !== 'multipleSelects') continue;
        if (!wf.options?.choices) continue;
        const existingField = table.fields.find(f => f.name === wf.name);
        if (!existingField) continue;
        if (existingField.type !== 'singleSelect' && existingField.type !== 'multipleSelects') continue;
        const existingChoices = existingField.options?.choices || [];
        const existingChoiceNames = new Set(existingChoices.map(c => c.name));
        const missing = wf.options.choices.filter(c => !existingChoiceNames.has(c.name));
        if (missing.length === 0) continue;
        dbg(`→ Ergänze ${missing.length} Option(en) für "${wf.name}"`, 'info');
        // Airtable PATCH format: keep existing choices with their IDs, append new ones with just {name}
        const mergedChoices = [
          ...existingChoices.map(c => ({ id: c.id, name: c.name })),
          ...missing.map(c => ({ name: c.name }))
        ];
        try {
          await metaApi(`/tables/${table.id}/fields/${existingField.id}`, {
            method: 'PATCH',
            body: JSON.stringify({ options: { choices: mergedChoices } })
          });
          existingField.options = { choices: mergedChoices };
          dbg(`✓ Optionen für "${wf.name}" aktualisiert`, 'ok');
        } catch (err) {
          // Fallback: versuche Feld komplett zu ersetzen (löschen + neu anlegen)
          dbg(`⚠ Options-Sync "${wf.name}" Standard-PATCH fehlgeschlagen, versuche Fallback…`, 'info');
          try {
            // Alternative: nur "name" ohne ids senden (manche Airtable-Versionen wollen das)
            const nameOnly = mergedChoices.map(c => ({ name: c.name }));
            await metaApi(`/tables/${table.id}/fields/${existingField.id}`, {
              method: 'PATCH',
              body: JSON.stringify({ options: { choices: nameOnly } })
            });
            dbg(`✓ Optionen für "${wf.name}" (name-only) aktualisiert`, 'ok');
          } catch (err2) {
            dbg(`✗ Options-Sync "${wf.name}" endgültig fehlgeschlagen: ${err2.message}`, 'error');
            dbg(`   Bitte "Öffnungsrichtung" in Airtable manuell um "Links"/"Rechts" erweitern`, 'info');
          }
        }
      }
    }

    // 3. Add link fields
    const aufmassId = existing[T_AUFMASS].id;
    for (const tableName of [T_TECHNIK, T_POSITIONEN]) {
      const table = existing[tableName];
      const hasLink = table.fields.some(f => f.name === 'Aufmaß' && f.type === 'multipleRecordLinks');
      if (hasLink) {
        dbg(`✓ Link-Feld in "${tableName}" vorhanden`, 'ok');
        continue;
      }
      dbg(`→ Füge Link-Feld "Aufmaß" zu "${tableName}" hinzu…`, 'info');
      try {
        await metaApi(`/tables/${table.id}/fields`, {
          method: 'POST',
          body: JSON.stringify({
            name: 'Aufmaß',
            type: 'multipleRecordLinks',
            options: { linkedTableId: aufmassId }
          })
        });
        created = true;
        dbg(`✓ Link-Feld zu "${tableName}" hinzugefügt`, 'ok');
      } catch (err) {
        dbg(`✗ Link-Feld-Fehler bei "${tableName}": ${err.message}`, 'error');
        throw err;
      }
    }

    if (created) {
      dbg('🎉 Bootstrap abgeschlossen — alle Tabellen bereit', 'ok');
      toast('Tabellen angelegt', 'success');
    } else {
      dbg('Alle Tabellen bereits vorhanden', 'ok');
    }

    // Populate fieldTypes map from actual Airtable schema (after bootstrap)
    // So saveField knows whether to send a number or a string
    try {
      const freshSchema = await metaApi('/tables');
      fieldTypes = {};
      for (const t of freshSchema.tables) {
        fieldTypes[t.name] = {};
        for (const f of t.fields) {
          fieldTypes[t.name][f.name] = f.type;
        }
      }
      dbg(`Feldtypen geladen: ${Object.keys(fieldTypes).length} Tabellen`, 'ok');
      // Log critical fields for debugging
      if (fieldTypes[T_POSITIONEN]) {
        dbg(`Nutmaß: ${fieldTypes[T_POSITIONEN]['Nutmaß']}, Einstand: ${fieldTypes[T_POSITIONEN]['Einstand']}, Öffnungsrichtung: ${fieldTypes[T_POSITIONEN]['Öffnungsrichtung']}`, 'info');
      }
    } catch (e) {
      dbg(`Feldtypen konnten nicht geladen werden: ${e.message}`, 'error');
    }
  } catch (e) {
    dbg(`FEHLER: ${e.message}`, 'error');
    dbgShow();
    toast('Schema-Setup fehlgeschlagen', 'error');
    throw e;
  } finally {
    showSpinner(false);
  }
}

/* =============================================================
   AUTH (lightweight gate — not real security)
============================================================= */
const AUTH_HASH = 'b35a3b8883b151d5e91b5b5afa055a2c058d77fa305b2ea5ec5ff874fc33a471';
const AUTH_SALT = 'schuler-aufmass-2026';
const AUTH_KEY = 'schuler_aufmass_authed_v1';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkLogin(user, pw) {
  const hash = await sha256(`${user}:${pw}:${AUTH_SALT}`);
  return hash === AUTH_HASH;
}

function isAuthed() {
  try { return sessionStorage.getItem(AUTH_KEY) === '1' || localStorage.getItem(AUTH_KEY) === '1'; }
  catch { return false; }
}

function setAuthed(remember) {
  try {
    sessionStorage.setItem(AUTH_KEY, '1');
    if (remember) localStorage.setItem(AUTH_KEY, '1');
  } catch {}
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('login-user').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!user || !pw) { errEl.textContent = 'Bitte Nutzername und Passwort eingeben'; return; }
  try {
    const ok = await checkLogin(user, pw);
    if (!ok) {
      errEl.textContent = 'Falsche Zugangsdaten';
      document.getElementById('login-pw').value = '';
      return;
    }
    setAuthed(true);
    document.getElementById('login-overlay').classList.add('hidden');
    init();
  } catch (e) {
    errEl.textContent = 'Fehler bei der Anmeldung';
  }
});

/* =============================================================
   INIT
============================================================= */
async function init() {
  window.addEventListener('error', (e) => {
    dbg(`JS-Fehler: ${e.message} (${e.filename}:${e.lineno})`, 'error');
  });
  window.addEventListener('unhandledrejection', (e) => {
    dbg(`Promise-Fehler: ${e.reason?.message || e.reason}`, 'error');
  });
  dbg('App gestartet', 'info');
  try {
    await bootstrapSchema();
  } catch (e) {
    return; // stop if schema setup failed
  }
  await loadDashboard();
}

// Boot: skip login if already authed in this browser
if (isAuthed()) {
  document.getElementById('login-overlay').classList.add('hidden');
  init();
} else {
  // Focus username field
  setTimeout(() => document.getElementById('login-user').focus(), 100);
}
</script>
