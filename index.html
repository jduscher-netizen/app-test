   OPEN PROJECT
============================================================= */
async function openProject(id) {
  showSpinner(true);
  try {
    // fetch full record
    const data = await api(`/${encodeTable(T_AUFMASS)}/${id}`);
    state.currentProjectRecord = data;
    state.currentProject = id;

    // load linked records
    const filter = `{Aufmaß} = '${(data.fields.Projektname || '').replace(/'/g, "\\'")}'`;
    // safer: fetch by record ids from linked field if available
    const posIds = data.fields[T_POSITIONEN] || data.fields['Positionen'] || [];
    const techIds = data.fields[T_TECHNIK] || data.fields['Technische Info'] || [];

    state.positions = [];
    if (posIds.length > 0) {
      const orFormula = 'OR(' + posIds.map(id => `RECORD_ID()='${id}'`).join(',') + ')';
      const posRecs = await listRecords(T_POSITIONEN, orFormula);
      state.positions = posRecs.sort((a, b) =>
        (a.fields['Pos-Nr'] || 0) - (b.fields['Pos-Nr'] || 0));
    }

    state.techInfo = null;
    if (techIds.length > 0) {
      const techRec = await api(`/${encodeTable(T_TECHNIK)}/${techIds[0]}`);
      state.techInfo = techRec;
    } else {
      // create empty tech info
      try {
        const created = await createRecord(T_TECHNIK, { 'Aufmaß': [id] });
        state.techInfo = created;
      } catch (e) { console.warn(e); }
    }

    state.currentPositionIndex = 0;

    document.getElementById('project-name-crumb').textContent = data.fields.Projektname || 'Projekt';
    showScreen('project');
    switchTab('overview');
  } catch (e) {
    toast('Projekt konnte nicht geladen werden', 'error');
    console.error(e);
  } finally {
    showSpinner(false);
  }
}

// Position completeness check
// Returns { status: 'complete'|'partial'|'empty', missing: [...] }
function positionCompleteness(pos) {
  const f = pos.fields;
  const required = [
    { key: 'Innenpress B', label: 'Innenpress Breite' },
    { key: 'Innenpress H', label: 'Innenpress Höhe' },
    { key: 'Konstruktion', label: 'Konstruktion' },
    { key: 'Öffnungsart', label: 'Öffnungsart' },
  ];
  const filled = required.filter(r => f[r.key] != null && f[r.key] !== '');
  const missing = required.filter(r => f[r.key] == null || f[r.key] === '').map(r => r.label);
  if (filled.length === required.length) return { status: 'complete', missing: [] };
  if (filled.length > 0) return { status: 'partial', missing };
  return { status: 'empty', missing };
}

function renderPills() {
  const bar = document.getElementById('pills-bar');
  const pills = state.positions.map((p, i) => {
    const num = p.fields['Pos-Nr'] || (i + 1);
    const room = p.fields['Kundenposition'] || '';
    const stockwerk = p.fields['Stockwerk'] || '';
    const ipB = p.fields['Innenpress B'];
    const ipH = p.fields['Innenpress H'];
    const measure = (ipB != null && ipH != null) ? `${ipB}×${ipH}` : '';
    const comp = positionCompleteness(p);
    const compDot = comp.status === 'complete' ? '🟢' : comp.status === 'partial' ? '🟡' : '🔴';
    const photoCount = (Array.isArray(p.fields['Notiz-Foto']) ? p.fields['Notiz-Foto'].length : 0);
    const photoInfo = photoCount > 0 ? `📷 ${photoCount}` : '';
    const tooltipParts = [room, stockwerk, measure, photoInfo, compDot + ' ' + (comp.status === 'complete' ? 'vollständig' : comp.missing.join(', '))].filter(Boolean).join(' · ') || `Position ${num}`;
    return `<button class="pill ${i === state.currentPositionIndex ? 'active' : ''} pill-${comp.status}"
      data-pos-index="${i}"
      data-tooltip="${escapeHtml(tooltipParts)}"
      onclick="goToPosition(${i})"><span class="pill-dot pill-dot-${comp.status}"></span>P${num}</button>`;
  }).join('');
  bar.innerHTML = pills + `<button class="pill add" onclick="addPosition()">+ Neu</button>`;
  // scroll active into view
  setTimeout(() => {
    const active = bar.querySelector('.pill.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
  // Attach long-press tooltip handlers
  attachPillTooltipHandlers(bar);
}

// Long-press tooltip on pills (>500ms hold = show tooltip without navigating)
function attachPillTooltipHandlers(container) {
  container.querySelectorAll('.pill[data-tooltip]').forEach(pill => {
    let pressTimer = null;
    let suppressClick = false;
    const showTooltip = () => {
      const tooltip = document.getElementById('pill-tooltip') || (() => {
        const el = document.createElement('div');
        el.id = 'pill-tooltip';
        el.className = 'pill-tooltip';
        document.body.appendChild(el);
        return el;
      })();
      tooltip.textContent = pill.dataset.tooltip;
      const rect = pill.getBoundingClientRect();
      tooltip.style.left = (rect.left + rect.width / 2) + 'px';
      tooltip.style.top = (rect.top - 8) + 'px';
      tooltip.classList.add('show');
      // Auto-hide after 2.5s
      clearTimeout(tooltip._hideTimer);
      tooltip._hideTimer = setTimeout(() => tooltip.classList.remove('show'), 2500);
    };
    pill.addEventListener('pointerdown', (e) => {
      pressTimer = setTimeout(() => {
        showTooltip();
        suppressClick = true;
      }, 500);
    });
    pill.addEventListener('pointerup', () => clearTimeout(pressTimer));
    pill.addEventListener('pointerleave', () => clearTimeout(pressTimer));
    pill.addEventListener('pointercancel', () => clearTimeout(pressTimer));
    pill.addEventListener('click', (e) => {
      if (suppressClick) {
        e.preventDefault();
        e.stopPropagation();
        suppressClick = false;
      }
    }, true);
  });
}

// Plausibility ranges for measurement fields (mm)
const MM_PLAUSIBILITY = {
  'Innenpress B':       { min: 200, max: 4000 },
  'Innenpress H':       { min: 200, max: 4000 },
  'Außenpress B':       { min: 200, max: 4000 },
  'Außenpress H':       { min: 200, max: 4000 },
  'Rollladendeckel B':  { min: 200, max: 4000 },
  'Rollladendeckel T':  { min: 100, max: 500 },
  'Versatz Innen-Innen':{ min: 0, max: 500 },
  'Versatz Innen-Außen':{ min: 0, max: 500 },
  'Nutmaß':             { min: 0, max: 200 },
  'Einstand':           { min: 0, max: 200 },
  'Nutmaß Gesamt':      { min: 0, max: 1000 },
};

// Build a measurement input wrapped with mm suffix and plausibility check
function mmInput(key, value, options = {}) {
  const { disabled = false, placeholder = '', enterkeyhint = 'next' } = options;
  const v = value ?? '';
  const numV = Number(v);
  let warnClass = '';
  let warnMsg = '';
  if (v !== '' && !isNaN(numV)) {
    const range = MM_PLAUSIBILITY[key];
    if (range) {
      if (numV < range.min) {
        warnClass = 'warn';
        warnMsg = `Sehr klein (< ${range.min} mm) — wirklich korrekt?`;
      } else if (numV > range.max) {
        warnClass = 'warn';
        warnMsg = `Sehr groß (> ${range.max} mm) — wirklich korrekt?`;
      }
    }
  }
  // Cross-field warnings
  if (key === 'Außenpress B' || key === 'Außenpress H') {
    const ipKey = key.replace('Außen', 'Innen');
    const innen = state.positions[state.currentPositionIndex]?.fields[ipKey];
    if (v !== '' && innen != null && innen !== '' && Number(v) < Number(innen)) {
      warnClass = 'warn';
      warnMsg = `Außen kleiner als Innen (${innen} mm) — vertauscht?`;
    }
  }
  return `
    <div class="mm-input-wrap ${warnClass}">
      <input type="text" pattern="[0-9,.]*" enterkeyhint="${enterkeyhint}"
             data-key="${key}" data-mm-input="1"
             value="${v}" placeholder="${placeholder}" ${disabled?'disabled':''}
             autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    ${warnMsg ? `<div class="mm-input-warn-msg">${warnMsg}</div>` : ''}
  `;
}

        }
        <input type="file" accept="image/*" capture="environment" id="note-photo-input" style="display:none;">
        <input type="file" accept="image/*" id="note-photo-input-library" style="display:none;">
      </div>

      <div class="pos-primary-actions">
        <button class="save-pos-btn" onclick="saveCurrentPosition()">💾 Speichern</button>
        <button class="next-pos-btn" onclick="goToNextOrCreatePosition()">Nächste Position →</button>
      </div>
      <div class="pos-secondary-actions">
        <button class="pos-secondary-btn" onclick="duplicateCurrentPosition()">📋 Duplizieren</button>
        <button class="pos-secondary-btn danger" onclick="deleteCurrentPosition()">🗑 Löschen</button>
      </div>
    </div>
  `;

  attachPositionHandlers(container);
  initSketchCanvas(sketchUrl);
}

async function goToNextOrCreatePosition() {
  await flushSketchAutoSave();
  if (state.currentPositionIndex < state.positions.length - 1) {
    nextPosition();
  } else {
    await addPosition();
  }
}

async function duplicateCurrentPosition() {
  const src = state.positions[state.currentPositionIndex];
  if (!src) { toast('Keine Position zum Duplizieren', 'error'); return; }
  showSpinner(true, 'Dupliziere…');
  try {
    const srcF = src.fields;
    const maxNum = state.positions.reduce((m, p) => Math.max(m, p.fields['Pos-Nr'] || 0), 0);

    // Felder die kopiert werden — immer gleich, egal ob Angebot oder Auftrag
    const copyFields = [
      'Kundenposition', 'Stockwerk',
      'Rolladen', 'Rollladen-Typ',
      'Innenpress B', 'Innenpress H',
      'Rollladendeckel T',
      'Kastenhöhe', 'Kastentiefe',
      'Lamellentyp', 'Screen Farbe', 'Windsensor',
      'Nutmaß', 'Einstand', 'Nutmaß Gesamt',
      'Beschlagsart',
      'Konstruktion', 'Öffnungsart', 'Öffnungsrichtung', 'Öffnungsschema',
      'Ornamentglas', 'Ornament Text',
      'Bedienung Typ', 'Bedienung Seite', 'Bedienung Notiz',
      'Insektenschutz', 'Insektenschutz Notiz',
      'Außenfensterbank Position',
    ];

    const newFields = {
      'Pos-Nr': maxNum + 1,
      'Aufmaß': [state.currentProject]
    };
    for (const key of copyFields) {
      const v = srcF[key];
      if (v == null || v === '') continue;
      // Skip attachments and linked records (arrays of objects with id/url)
      if (Array.isArray(v) && v[0] && typeof v[0] === 'object' && (v[0].url || v[0].id)) continue;
      try {
        newFields[key] = coerceValue(T_POSITIONEN, key, v);
      } catch (e) {
        dbg(`Skipping field "${key}" in duplicate: ${e.message}`, 'info');
      }
    }
    dbg(`Duplicate (${isAngebot ? 'Angebot' : 'Auftrag'}): ${Object.keys(newFields).length} fields`, 'info');
    const rec = await createRecord(T_POSITIONEN, newFields);
    state.positions.push(rec);
    state.positions.sort((a, b) => (a.fields['Pos-Nr'] || 0) - (b.fields['Pos-Nr'] || 0));
    state.currentPositionIndex = state.positions.findIndex(p => p.id === rec.id);
    renderPositions();
    scrollToTop();
    // Auto-focus on first empty measurement field
    setTimeout(() => focusFirstEmptyMeasurement(), 200);
    toast('Position dupliziert', 'success');
  } catch (e) {
    dbg(`Duplicate failed: ${e.message}`, 'error');
    toast(`Duplizieren fehlgeschlagen: ${String(e.message || e).slice(0, 100)}`, 'error');
  } finally {
    showSpinner(false);
  }
}

// Auto-focus the first empty measurement input after a duplicate
function focusFirstEmptyMeasurement() {
  const candidates = ['Innenpress B', 'Innenpress H', 'Außenpress B', 'Außenpress H'];
  for (const key of candidates) {
    const el = document.querySelector(`input[data-key="${key}"]`);
    if (el && (!el.value || el.value === '')) {
      el.focus();
      return;
    }
  }
}

/* Position-specific helpers — robust numeric parsing */
function toNum(v) {
  if (v == null || v === '') return null;
  const n = typeof v === 'number' ? v : Number(String(v).replace(',', '.'));
  return isNaN(n) ? null : n;
}
function computeDifferenz(a, b) {
  const x = toNum(a), y = toNum(b);
  if (x == null || y == null) return null;
  return x - y;
}
function computeGesamt(a, b) {
  const x = toNum(a), y = toNum(b);
  if (x == null || y == null) return null;
  return x + y;
}
function formatDifferenz(d) {
  if (d == null || isNaN(d)) return '—';
  if (d === 0) return 'gleich';
  if (d > 0) return `außen ${d} höher`;
  return `außen ${Math.abs(d)} tiefer`;
}

function attachPositionHandlers(container) {
  container.querySelectorAll('input[data-key], select[data-key], textarea[data-key]').forEach(el => {
    // Skip disabled fields - no save events for them
    if (el.disabled) return;
    const evt = (el.tagName === 'SELECT') ? 'change' : 'blur';
    el.addEventListener(evt, async () => {
      await handlePositionFieldChange(el, container);
      const key = el.dataset.key;
      const pos = state.positions[state.currentPositionIndex];

      // Konstruktion change (Schritt 1) → reset Öffnungsart if incompatible
      if (key === 'Konstruktion' && pos) {
        const validOpts = ÖFFNUNGSART_BY_KONSTRUKTION[el.value] || [];
        const current = pos.fields['Öffnungsart'];
        if (current && !validOpts.includes(current)) {
          try {
            await saveField('position', 'Öffnungsart', null);
            pos.fields['Öffnungsart'] = null;
          } catch {}
        }
        renderPositionForm();
        return;
      }

      // Öffnungsart change (Schritt 2) → re-render so that Skizze + Öffnungs-Notiz appear
      if (key === 'Öffnungsart') {
        renderPositionForm();
        return;
      }

      // Rollladen-Typ change → re-render for type-specific fields
      if (key === 'Rollladen-Typ') {
        renderPositionForm();
        return;
      }
    });
  });

  // Toggle-bool groups (Ornamentglas, Windsensor, Rolladen-legacy, Außenfensterbank)
  container.querySelectorAll('.toggle-group[data-toggle-bool]').forEach(group => {
    const key = group.dataset.key;
    if (!key) return;
    group.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.addEventListener('click', async () => {
        const newVal = opt.dataset.val === 'true';
        group.querySelectorAll('.toggle-opt').forEach(o => o.classList.toggle('active', o === opt));
        await saveField('position', key, newVal);
        // Re-render when toggle affects which fields are shown
        if (key === 'Ornamentglas' || key === 'Außenfensterbank Position') {
          renderPositionForm();
        }
      });
    });
  });

  // Note photo upload — camera input (take photo)
  const photoInput = container.querySelector('#note-photo-input');
  if (photoInput) {
    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await uploadNotePhoto(file);
      e.target.value = '';
      // Offer to take another photo immediately
      promptAnotherPhoto('capture');
    });
  }
  // Note photo upload — library input (pick from photos)
  const photoInputLib = container.querySelector('#note-photo-input-library');
  if (photoInputLib) {
    photoInputLib.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await uploadNotePhoto(file);
      e.target.value = '';
      promptAnotherPhoto('library');
    });
  }
}

// Show "Noch ein Foto?" toast after photo upload
function promptAnotherPhoto(mode) {
  const toastEl = document.getElementById('toast');
  if (!toastEl) return;
  toastEl.className = 'toast success show';
  toastEl.innerHTML = `✓ Foto gespeichert <button onclick="triggerAnotherPhoto('${mode}')" style="margin-left:12px;background:#fff;color:#222;border:none;border-radius:12px;padding:4px 14px;font-weight:600;font-size:13px;cursor:pointer;">+ Noch eins</button>`;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { toastEl.classList.remove('show'); }, 5000);
}
function triggerAnotherPhoto(mode) {
  const container = document.getElementById('position-container');
  if (!container) return;
  const id = mode === 'capture' ? 'note-photo-input' : 'note-photo-input-library';
  const input = container.querySelector('#' + id);
  if (input) input.click();
  // Hide toast
  const toastEl = document.getElementById('toast');
  if (toastEl) toastEl.classList.remove('show');
}

// Remove a single photo by index from the Notiz-Foto array
async function removeNotePhoto(idx) {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  const photos = Array.isArray(pos.fields['Notiz-Foto']) ? pos.fields['Notiz-Foto'] : [];
  if (idx < 0 || idx >= photos.length) return;
  const ok = await confirmDialog('Foto entfernen?', `Foto ${idx + 1} wird aus dieser Position gelöscht.`, 'Entfernen');
  if (!ok) return;
  // Build new attachment array WITHOUT the removed item — only id+url needed
  const newPhotos = photos
    .filter((_, i) => i !== idx)
    .map(p => ({ id: p.id }));
  try {
    await saveField('position', 'Notiz-Foto', newPhotos);
    renderPositionForm();
    toast('Foto entfernt', 'success');
  } catch (e) {
    toast('Entfernen fehlgeschlagen', 'error');
  }
}

// Lightbox: full-screen photo viewer with swipe between photos
let _lightboxIdx = 0;
function openLightbox(idx) {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  const photos = Array.isArray(pos.fields['Notiz-Foto']) ? pos.fields['Notiz-Foto'] : [];
  if (photos.length === 0) return;
  _lightboxIdx = idx;
  let overlay = document.getElementById('lightbox-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'lightbox-overlay';
    overlay.className = 'lightbox-overlay';
    overlay.innerHTML = `
      <button class="lightbox-close" onclick="closeLightbox()">×</button>
      <button class="lightbox-nav lightbox-prev" onclick="lightboxPrev()">‹</button>
      <img class="lightbox-img" id="lightbox-img" alt="">
      <button class="lightbox-nav lightbox-next" onclick="lightboxNext()">›</button>
      <div class="lightbox-counter" id="lightbox-counter"></div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeLightbox();
    });
    // Swipe handling
    let startX = null;
    overlay.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) startX = e.touches[0].clientX;
    });
    overlay.addEventListener('touchend', (e) => {
      if (startX == null) return;
      const endX = e.changedTouches[0].clientX;
      const dx = endX - startX;
      if (Math.abs(dx) > 50) {
        if (dx > 0) lightboxPrev();
        else lightboxNext();
      }
      startX = null;
    });
  }
  updateLightbox();
  overlay.classList.add('show');
}

function updateLightbox() {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  const photos = Array.isArray(pos.fields['Notiz-Foto']) ? pos.fields['Notiz-Foto'] : [];
  if (photos.length === 0) { closeLightbox(); return; }
  if (_lightboxIdx < 0) _lightboxIdx = photos.length - 1;
  if (_lightboxIdx >= photos.length) _lightboxIdx = 0;
  const att = photos[_lightboxIdx];
  const img = document.getElementById('lightbox-img');
  if (img) img.src = att.thumbnails?.full?.url || att.url;
  const counter = document.getElementById('lightbox-counter');
  if (counter) counter.textContent = `${_lightboxIdx + 1} / ${photos.length}`;
  // Hide nav buttons if only one photo
  const prev = document.querySelector('.lightbox-prev');
  const next = document.querySelector('.lightbox-next');
  if (prev) prev.style.display = photos.length > 1 ? '' : 'none';
  if (next) next.style.display = photos.length > 1 ? '' : 'none';
}

function lightboxPrev() { _lightboxIdx--; updateLightbox(); }
function lightboxNext() { _lightboxIdx++; updateLightbox(); }
function closeLightbox() {
  const overlay = document.getElementById('lightbox-overlay');
  if (overlay) overlay.classList.remove('show');
}

async function uploadNotePhoto(file) {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  showSpinner(true);
  try {
    const base64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
    const url = airtableContentUrl(pos.id, 'Notiz-Foto');
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': authHeader(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contentType: file.type || 'image/jpeg',
        file: base64,
        filename: file.name || `foto-pos${pos.fields['Pos-Nr'] || ''}-${Date.now()}.jpg`
      })
    });
    if (!res.ok) {
      const err = await res.text();
      dbg(`Note photo upload: ${err}`, 'error');
      throw new Error('Upload fehlgeschlagen');
    }
    const data = await res.json();
    pos.fields = { ...pos.fields, ...(data.fields || {}) };
    toast('Foto gespeichert', 'success');
    renderPositionForm();
  } catch (e) {
    toast('Foto-Upload fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

async function handlePositionFieldChange(el, container) {
  const key = el.dataset.key;
  let val = el.value;
  if (el.type === 'number') {
    val = val === '' ? null : Number(val);
  } else if (el.dataset.mmInput === '1') {
    // Measurement input (text-type with numeric inputmode) — parse robustly
    const trimmed = String(val).trim().replace(',', '.');
    if (trimmed === '') {
      val = null;
    } else {
      const n = Number(trimmed);
      if (isNaN(n)) {
        // Invalid input — show warning and don't save
        toast('Ungültige Zahl: ' + val, 'error');
        return;
      }
      val = n;
      // Update the input value to show the cleaned format
      el.value = String(n);
    }
  } else if (val === '') {
    val = null;
  }

  let saveOk = false;
  try {
    await saveField('position', key, val);
    saveOk = true;
  } catch (err) {
    // queueOfflineSave already handled in saveField — just don't show success
  }

  // Live plausibility update for mm inputs
  if (el.dataset.mmInput === '1') {
    updatePlausibilityForInput(el, container);
    if (saveOk) showSavedTickOnInput(el);
  }

  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;

  // Computed fields: silent save (don't toast error if these optional fields fail)
  if (key === 'Versatz Innen-Innen' || key === 'Versatz Innen-Außen') {
    const ii = pos.fields['Versatz Innen-Innen'];
    const ia = pos.fields['Versatz Innen-Außen'];
    const diff = computeDifferenz(ii, ia);
    const disp = document.getElementById('versatz-diff-display');
    if (disp) disp.textContent = formatDifferenz(diff);
    await saveFieldSilent('position', 'Versatz Differenz', diff);
  }
  if (key === 'Nutmaß' || key === 'Einstand') {
    const n = pos.fields['Nutmaß'];
    const e = pos.fields['Einstand'];
    const g = computeGesamt(n, e);
    const disp = document.getElementById('nutmass-gesamt-display');
    if (disp) disp.textContent = g != null ? g : '—';
    await saveFieldSilent('position', 'Nutmaß Gesamt', g);
  }
  if (key === 'Innenpress B') {
    const rollInput = container.querySelector('input[data-key="Rollladendeckel B"]');
    const currentRoll = pos.fields['Rollladendeckel B'];
    if (rollInput && (currentRoll == null || currentRoll === '')) {
      const newDefault = val != null ? Number(val) + 15 : null;
      if (newDefault != null) {
        rollInput.value = newDefault;
        await saveFieldSilent('position', 'Rollladendeckel B', newDefault);
        updatePlausibilityForInput(rollInput, container);
      } else {
        rollInput.placeholder = '';
      }
    } else if (rollInput) {
      rollInput.placeholder = val != null ? Number(val) + 15 : '';
    }
  }
  // When Innenpress B/H changes, re-check Außenpress for cross-field warning
  if (key === 'Innenpress B' || key === 'Innenpress H') {
    const apKey = key.replace('Innen', 'Außen');
    const apEl = container.querySelector(`input[data-key="${apKey}"]`);
    if (apEl) updatePlausibilityForInput(apEl, container);
  }
}

// Live plausibility check on a single input — toggles .warn class on the wrapper
function updatePlausibilityForInput(el, container) {
  const wrap = el.closest('.mm-input-wrap');
  if (!wrap) return;
  const key = el.dataset.key;
  const val = el.value;
  let warn = false;
  let msg = '';

  if (val !== '' && !isNaN(Number(val))) {
    const numV = Number(val);
    const range = MM_PLAUSIBILITY[key];
    if (range) {
      if (numV < range.min) {
        warn = true;
        msg = `Sehr klein (< ${range.min} mm) — wirklich korrekt?`;
      } else if (numV > range.max) {
        warn = true;
        msg = `Sehr groß (> ${range.max} mm) — wirklich korrekt?`;
      }
    }
    // Cross-field: Außen < Innen
    if (key === 'Außenpress B' || key === 'Außenpress H') {
      const ipKey = key.replace('Außen', 'Innen');
      const innen = state.positions[state.currentPositionIndex]?.fields[ipKey];
      if (innen != null && innen !== '' && numV < Number(innen)) {
        warn = true;
        msg = `Außen kleiner als Innen (${innen} mm) — vertauscht?`;
      }
    }
  }

  wrap.classList.toggle('warn', warn);
  // Update or create warning message
  let msgEl = wrap.nextElementSibling;
  if (msgEl && !msgEl.classList.contains('mm-input-warn-msg')) msgEl = null;
  if (warn) {
    if (!msgEl) {
      msgEl = document.createElement('div');
      msgEl.className = 'mm-input-warn-msg';
      wrap.parentNode.insertBefore(msgEl, wrap.nextSibling);
    }
    msgEl.textContent = msg;
  } else if (msgEl) {
    msgEl.remove();
  }
}

// Brief checkmark animation when a save succeeds
function showSavedTickOnInput(el) {
  const wrap = el.closest('.mm-input-wrap');
  if (!wrap) return;
  wrap.classList.remove('saved');
  // Force reflow to restart animation
  void wrap.offsetWidth;
  wrap.classList.add('saved');
  setTimeout(() => wrap.classList.remove('saved'), 1300);
}

/* Explicit "save now" — forces any focused input to blur (triggering auto-save),
   then shows confirmation toast. All fields already auto-save on blur; this button
   is for users who want explicit confirmation. */
async function saveCurrentPosition() {
  // Blur the active element if it's inside the position form
  const active = document.activeElement;
  if (active && active.blur && active !== document.body) {
    active.blur();
  }
  // Small delay so blur event handlers (field auto-saves) can run first
  await new Promise(r => setTimeout(r, 150));
  toast('Position gespeichert', 'success');
}
async function saveFieldSilent(prefix, key, value) {
  let table, recordId, localRecord;
  if (prefix === 'position') {
    const pos = state.positions[state.currentPositionIndex];
    if (!pos) return;
    table = T_POSITIONEN;
    recordId = pos.id;
    localRecord = pos;
  } else return;
  const oldVal = localRecord.fields[key];
  if (value == null) delete localRecord.fields[key];
  else localRecord.fields[key] = value;
  const coerced = coerceValue(table, key, value);
  try {
    const payload = {}; payload[key] = coerced;
    const updated = await updateRecord(table, recordId, payload);
    if (updated && updated.fields) {
      localRecord.fields = { ...localRecord.fields, ...updated.fields };
    }
    if (value == null) delete localRecord.fields[key];
  } catch (e) {
    if (oldVal === undefined) delete localRecord.fields[key];
    else localRecord.fields[key] = oldVal;
    dbg(`Silent save failed: ${key}: ${e.message}`, 'error');
    // no toast — computed fields failing shouldn't alarm the user
  }
}

async function deleteCurrentPosition() {
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  const num = pos.fields['Pos-Nr'] || (state.currentPositionIndex + 1);
  const ok = await confirmDialog('Position löschen?', `Position ${num} wird endgültig aus Airtable entfernt.`);
  if (!ok) return;
  showSpinner(true);
  try {
    await deleteRecord(T_POSITIONEN, pos.id);
    state.positions.splice(state.currentPositionIndex, 1);
    if (state.currentPositionIndex >= state.positions.length) {
      state.currentPositionIndex = Math.max(0, state.positions.length - 1);
    }
    toast('Position gelöscht', 'success');
    renderPositions();
  } catch (e) {
    toast('Löschen fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

/* =============================================================
   SKETCH CANVAS — Pencil-only, collapsible
============================================================= */
let sketchCtx = null;
let sketchDrawing = false;
let sketchInitialized = false;
let sketchMode = 'pen'; // 'pen' = only Apple Pencil, 'any' = finger+pen
let sketchPendingUrl = null; // URL of existing sketch to load when panel opens
let sketchHistory = []; // ImageData snapshots for undo
let sketchAutoSaveTimer = null;
let sketchDirty = false; // true = unsaved changes since last save
const SKETCH_HISTORY_MAX = 30;
const SKETCH_AUTOSAVE_DELAY_MS = 1500;

function initSketchCanvas(existingUrl) {
  // Don't init canvas immediately — only store the URL and wait for user to expand the panel
  sketchPendingUrl = existingUrl || null;
  sketchInitialized = false;
  sketchCtx = null;
  sketchHistory = [];
  // If panel was already open (user navigated within positions), hide it first so user
  // consciously re-opens it for the new position
  const panel = document.getElementById('sketch-panel');
  const icon = document.getElementById('sketch-toggle-icon');
  if (panel) panel.style.display = 'none';
  if (icon) icon.textContent = '▸';
}

function toggleSketchPanel() {
  const panel = document.getElementById('sketch-panel');
  const icon = document.getElementById('sketch-toggle-icon');
  const label = document.getElementById('sketch-toggle-label');
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    panel.style.display = 'none';
    if (icon) icon.textContent = '▸';
  } else {
    panel.style.display = 'block';
    if (icon) icon.textContent = '▾';
    if (label) label.textContent = 'Skizze bearbeiten';
    // Init the canvas now (first time panel is opened for this position)
    if (!sketchInitialized) {
      setTimeout(() => doInitCanvas(sketchPendingUrl), 50); // small delay so canvas has layout
    }
  }
}

// Auto-save scheduler: debounces uploads so fast consecutive strokes
// only trigger one upload after the user pauses for 1.5s
function scheduleSketchAutoSave() {
  if (sketchAutoSaveTimer) clearTimeout(sketchAutoSaveTimer);
  sketchAutoSaveTimer = setTimeout(() => {
    sketchAutoSaveTimer = null;
    if (sketchDirty && sketchInitialized) {
      saveSketch({ silent: true });
    }
  }, SKETCH_AUTOSAVE_DELAY_MS);
}

// Force immediate save (e.g. before switching positions)
async function flushSketchAutoSave() {
  if (sketchAutoSaveTimer) {
    clearTimeout(sketchAutoSaveTimer);
    sketchAutoSaveTimer = null;
  }
  if (sketchDirty && sketchInitialized) {
    await saveSketch({ silent: true });
  }
}

function pushSketchHistory() {
  if (!sketchCtx) return;
  try {
    const canvas = document.getElementById('sketch-canvas');
    const snapshot = sketchCtx.getImageData(0, 0, canvas.width, canvas.height);
    sketchHistory.push(snapshot);
    if (sketchHistory.length > SKETCH_HISTORY_MAX) sketchHistory.shift();
    updateUndoButton();
  } catch (e) {
    // Tainted canvas (CORS) — undo won't work, that's OK
    console.warn('Sketch history snapshot failed:', e);
  }
}
function undoSketch() {
  if (!sketchCtx || sketchHistory.length === 0) return;
  const prev = sketchHistory.pop();
  try {
    sketchCtx.putImageData(prev, 0, 0);
  } catch (e) {
    console.warn('Sketch undo failed:', e);
  }
  updateUndoButton();
}
function updateUndoButton() {
  const btn = document.getElementById('sketch-undo-btn');
  if (btn) btn.disabled = sketchHistory.length === 0;
}

function doInitCanvas(existingUrl) {
  const canvas = document.getElementById('sketch-canvas');
  if (!canvas) return;
  sketchCtx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  sketchCtx.scale(dpr, dpr);
  sketchCtx.lineWidth = 2.2;
  sketchCtx.lineCap = 'round';
  sketchCtx.lineJoin = 'round';
  sketchCtx.strokeStyle = '#1c1c1e';
  sketchCtx.fillStyle = '#ffffff';
  sketchCtx.fillRect(0, 0, rect.width, rect.height);

  if (existingUrl) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => sketchCtx.drawImage(img, 0, 0, rect.width, rect.height);
    img.onerror = () => {};
    img.src = existingUrl;
  }

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  };

  // Check if the pointer event should be accepted based on mode
  const shouldDraw = (e) => {
    if (sketchMode === 'pen') {
      return e.pointerType === 'pen';
    }
    return true; // 'any' mode
  };

  // Block page scroll while actively drawing (esp. iPad Apple Pencil)
  let prevBodyOverflow = '';
  let prevBodyTouchAction = '';
  const lockScroll = () => {
    prevBodyOverflow = document.body.style.overflow;
    prevBodyTouchAction = document.body.style.touchAction;
    document.body.style.overflow = 'hidden';
    document.body.style.touchAction = 'none';
  };
  const unlockScroll = () => {
    document.body.style.overflow = prevBodyOverflow || '';
    document.body.style.touchAction = prevBodyTouchAction || '';
  };

  const start = (e) => {
    if (!shouldDraw(e)) return;
    e.preventDefault();
    e.stopPropagation();
    lockScroll();
    // Snapshot BEFORE the stroke so undo restores pre-stroke state
    pushSketchHistory();
    sketchDrawing = true;
    try { canvas.setPointerCapture(e.pointerId); } catch {}
    const p = getPos(e);
    sketchCtx.beginPath();
    sketchCtx.moveTo(p.x, p.y);
    // draw a dot in case of single tap
    sketchCtx.lineTo(p.x + 0.01, p.y + 0.01);
    sketchCtx.stroke();
  };
  const move = (e) => {
    if (!sketchDrawing) return;
    if (!shouldDraw(e)) return;
    e.preventDefault();
    const p = getPos(e);
    sketchCtx.lineTo(p.x, p.y);
    sketchCtx.stroke();
  };
  const end = (e) => {
    if (sketchDrawing) {
      sketchDrawing = false;
      unlockScroll();
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
      // Auto-save: debounced upload 1.5s after the last stroke
      sketchDirty = true;
      scheduleSketchAutoSave();
    }
  };

  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointercancel', end);
  canvas.addEventListener('pointerleave', end);

  // Prevent native touch scroll/gestures from firing on the canvas itself
  canvas.addEventListener('touchstart', (e) => {
    if (sketchMode === 'any') e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    if (sketchDrawing) e.preventDefault();
  }, { passive: false });

  // Mode toggle
  document.querySelectorAll('input[name="sketch-mode"]').forEach(radio => {
    radio.addEventListener('change', (ev) => {
      sketchMode = ev.target.value;
      // pen-mode: touch-action auto so finger scrolls, pen still draws via pointerType check
      // any-mode: touch-action none so finger draws without triggering scroll
      canvas.style.touchAction = sketchMode === 'pen' ? 'pan-y' : 'none';
    });
  });
  canvas.style.touchAction = sketchMode === 'pen' ? 'pan-y' : 'none';

  // Clear = erase drawing surface (but don't delete from Airtable)
  document.getElementById('sketch-clear-btn').onclick = () => {
    pushSketchHistory(); // make clear undoable
    const r = canvas.getBoundingClientRect();
    sketchCtx.fillStyle = '#ffffff';
    sketchCtx.fillRect(0, 0, r.width, r.height);
  };

  // Undo
  const undoBtn = document.getElementById('sketch-undo-btn');
  if (undoBtn) undoBtn.onclick = undoSketch;

  // Save = upload current canvas as new attachment
  document.getElementById('sketch-save-btn').onclick = saveSketch;

  // Delete = remove attachment from Airtable, clear canvas, keep panel open + editable
  const delBtn = document.getElementById('sketch-delete-btn');
  if (delBtn) {
    delBtn.onclick = async () => {
      const pos = state.positions[state.currentPositionIndex];
      if (!pos) return;
      const hasAny = Array.isArray(pos.fields['Skizze']) && pos.fields['Skizze'].length > 0;
      if (!hasAny) {
        // Nothing saved yet → just clear canvas
        const r = canvas.getBoundingClientRect();
        sketchCtx.fillStyle = '#ffffff';
        sketchCtx.fillRect(0, 0, r.width, r.height);
        return;
      }
      const ok = await confirmDialog('Skizze entfernen?', 'Die gespeicherte Skizze wird gelöscht.', 'Entfernen');
      if (!ok) return;
      try {
        await saveField('position', 'Skizze', []);
        // Clear the canvas in place — don't re-render the whole form
        const r = canvas.getBoundingClientRect();
        sketchCtx.fillStyle = '#ffffff';
        sketchCtx.fillRect(0, 0, r.width, r.height);
        sketchPendingUrl = null;
        // Hide the "vorhanden" badge and collapsed preview by re-rendering the form header later;
        // but keep the panel open so user can immediately draw a new sketch
        const badge = document.querySelector('.sketch-toggle-badge');
        if (badge) badge.remove();
        const preview = document.querySelector('.sketch-collapsed-preview');
        if (preview) preview.remove();
        const label = document.getElementById('sketch-toggle-label');
        if (label) label.textContent = 'Skizze zeichnen';
        toast('Skizze entfernt', 'success');
      } catch (e) {
        toast('Entfernen fehlgeschlagen', 'error');
      }
    };
  }

  sketchInitialized = true;
}

async function saveSketch(opts = {}) {
  const { silent = false } = opts;
  const canvas = document.getElementById('sketch-canvas');
  if (!canvas) return;
  const pos = state.positions[state.currentPositionIndex];
  if (!pos) return;
  if (!silent) showSpinner(true);
  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const base64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
    const url = airtableContentUrl(pos.id, 'Skizze');
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': authHeader(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contentType: 'image/png',
        file: base64,
        filename: `skizze-pos${pos.fields['Pos-Nr'] || ''}-${Date.now()}.png`
      })
    });
    if (!res.ok) {
      const err = await res.text();
      dbg(`Sketch upload: ${err}`, 'error');
      throw new Error('Upload fehlgeschlagen');
    }
    const data = await res.json();
    // Merge, don't overwrite — Airtable only returns populated fields
    if (data && data.fields) {
      pos.fields = { ...pos.fields, ...data.fields };
    }
    sketchDirty = false;
    if (silent) {
      // Show small indicator instead of full toast
      showSaveIndicator('saved');
    } else {
      toast('Skizze gespeichert', 'success');
    }
    // Update the toggle button state without re-rendering
    const label = document.getElementById('sketch-toggle-label');
    if (label) label.textContent = 'Skizze bearbeiten';
    const toggleBtn = document.getElementById('sketch-toggle-btn');
    if (toggleBtn && !toggleBtn.querySelector('.sketch-toggle-badge')) {
      const badge = document.createElement('span');
      badge.className = 'sketch-toggle-badge';
      badge.textContent = 'vorhanden';
      toggleBtn.appendChild(badge);
    }
  } catch (e) {
    if (!silent) toast('Skizze speichern fehlgeschlagen', 'error');
    else dbg('Auto-Save Skizze fehlgeschlagen', 'error');
  } finally {
    if (!silent) showSpinner(false);
  }
}

async function deleteRecord(table, id) {
  const res = await fetch(airtableUrl(`/${encodeTable(table)}/${id}`), {
    method: 'DELETE',
    headers: { 'Authorization': authHeader() }
  });
  if (!res.ok) { const err = await res.text(); dbg(`Delete: ${err}`, 'error'); throw new Error('Delete fehlgeschlagen'); }
  return true;
}

function renderPositionNav() {
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  const counter = document.getElementById('nav-counter');
  const total = state.positions.length;
  const idx = state.currentPositionIndex;
  if (total === 0) {
    counter.textContent = 'Keine Pos.';
    prev.disabled = true; next.disabled = true;
    return;
  }
  counter.textContent = `Pos ${idx + 1} von ${total}`;
  prev.disabled = idx === 0;
  next.disabled = idx === total - 1;
}

async function goToPosition(i) {
  if (i < 0 || i >= state.positions.length) return;
  // Flush any pending sketch auto-save BEFORE changing position
  await flushSketchAutoSave();
  state.currentPositionIndex = i;
  renderPositions();
  scrollToTop();
}
function prevPosition() { goToPosition(state.currentPositionIndex - 1); }
function nextPosition() { goToPosition(state.currentPositionIndex + 1); }

function scrollToTop() {
  // Scroll window and any scrollable ancestor to the top so the new position
  // is shown from the beginning. Instant scroll (not smooth) for reliability on iOS.
  try {
    window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
  } catch {
    window.scrollTo(0, 0);
  }
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
}

async function addPosition() {
  await flushSketchAutoSave();
  showSpinner(true);
  try {
    const maxNum = state.positions.reduce((m, p) => Math.max(m, p.fields['Pos-Nr'] || 0), 0);
    const rec = await createRecord(T_POSITIONEN, {
      'Pos-Nr': maxNum + 1,
      'Aufmaß': [state.currentProject]
    });
    state.positions.push(rec);
    state.positions.sort((a, b) => (a.fields['Pos-Nr'] || 0) - (b.fields['Pos-Nr'] || 0));
    state.currentPositionIndex = state.positions.findIndex(p => p.id === rec.id);
    renderPositions();
    scrollToTop();
    toast('Position hinzugefügt', 'success');
  } catch (e) {
    toast('Fehler beim Anlegen', 'error');
  } finally {
    showSpinner(false);
  }
}

/* =============================================================
   FIELD RENDERING (shared)
============================================================= */
function renderFields(defs, values, prefix) {
  let html = '';
  let rowBuffer = null;
  let pairBuffer = null; // for pair: 'start'/'end' grouping
  for (const def of defs) {
    if (def.section) {
      if (rowBuffer) { html += closeRow(rowBuffer); rowBuffer = null; }
      if (pairBuffer) { html += `<div class="field-row">${pairBuffer}</div>`; pairBuffer = null; }
      html += `<div class="section-title">${def.section}</div>`;
      continue;
    }
    const v = values[def.key];
    const fieldHtml = renderField(def, v, prefix);

    // pair grouping: pair:'start' opens a row, pair:'end' closes it
    if (def.pair === 'start') {
      if (pairBuffer) { html += `<div class="field-row">${pairBuffer}</div>`; }
      pairBuffer = fieldHtml;
      continue;
    }
    if (def.pair === 'end' && pairBuffer) {
      html += `<div class="field-row">${pairBuffer}${fieldHtml}</div>`;
      pairBuffer = null;
      continue;
    }
    // Flush any dangling pair
    if (pairBuffer) { html += `<div class="field-row">${pairBuffer}</div>`; pairBuffer = null; }

    if (def.row) {
      if (!rowBuffer) rowBuffer = { row: def.row, html: '' };
      if (rowBuffer.row !== def.row) {
        html += closeRow(rowBuffer);
        rowBuffer = { row: def.row, html: '' };
      }
      rowBuffer.html += fieldHtml;
    } else {
      if (rowBuffer) { html += closeRow(rowBuffer); rowBuffer = null; }
      html += fieldHtml;
    }
  }
  if (rowBuffer) html += closeRow(rowBuffer);
  if (pairBuffer) html += `<div class="field-row">${pairBuffer}</div>`;
  return html;
}
function closeRow(buf) {
  // PLZ + Ort layout: schmale PLZ, breiter Ort
  if (buf.row && buf.row.endsWith('-ort')) {
    return `<div style="display:grid;grid-template-columns:1fr 2fr;gap:10px;">${buf.html}</div>`;
  }
  return `<div class="field-row">${buf.html}</div>`;
}

function renderField(def, value, prefix) {
  const id = `${prefix}-${def.key.replace(/[^a-z0-9]/gi,'_')}`;
  const ro = def.readonly ? 'readonly' : '';
  if (def.type === 'text' || def.type === 'tel' || def.type === 'email') {
    return `<div class="field">
      <label>${def.label}</label>
      <input type="${def.type}" id="${id}" data-key="${def.key}" value="${escapeHtml(value || '')}" ${ro}>
    </div>`;
  }
  if (def.type === 'number') {
    return `<div class="field">
      <label>${def.label}</label>
      <input type="number" id="${id}" data-key="${def.key}" value="${value == null ? '' : value}" ${ro}>
    </div>`;
  }
  if (def.type === 'date') {
    return `<div class="field">
      <label>${def.label}</label>
      <input type="date" id="${id}" data-key="${def.key}" value="${value || ''}">
    </div>`;
  }
  if (def.type === 'textarea') {
    return `<div class="field">
      <label>${def.label}</label>
      <textarea id="${id}" data-key="${def.key}">${escapeHtml(value || '')}</textarea>
    </div>`;
  }
  if (def.type === 'select') {
    const opts = ['<option value="">—</option>'].concat(
      def.options.map(o => `<option value="${escapeHtml(o)}" ${value === o ? 'selected' : ''}>${escapeHtml(o)}</option>`)
    ).join('');
    return `<div class="field">
      <label>${def.label}</label>
      <select id="${id}" data-key="${def.key}">${opts}</select>
    </div>`;
  }
  if (def.type === 'multi') {
    const vals = Array.isArray(value) ? value : [];
    const chips = def.options.map(o =>
      `<button type="button" class="chip ${vals.includes(o) ? 'active' : ''}" data-key="${def.key}" data-val="${escapeHtml(o)}" data-multi="1">${escapeHtml(o)}</button>`
    ).join('');
    return `<div class="field">
      <label>${def.label}</label>
      <div class="chip-group">${chips}</div>
    </div>`;
  }
  if (def.type === 'photo') {
    const hasPhoto = Array.isArray(value) && value.length > 0;
    const url = hasPhoto ? value[0].url : '';
    return `<div class="field">
      <label>${def.label}</label>
      ${hasPhoto
        ? `<img src="${url}" class="photo-preview" alt="Skizze">`
        : `<label class="photo-zone" for="${id}">📷 Foto aufnehmen oder wählen</label>`
      }
      <input type="file" accept="image/*" capture="environment" id="${id}" data-key="${def.key}" data-photo="1" style="display:none;">
    </div>`;
  }
  if (def.type === 'toggle-bool') {
    const v = !!value;
    return `<div class="field">
      <label>${def.label}</label>
      <div class="toggle-group" data-key="${def.key}" data-toggle-bool="1">
        <div class="toggle-opt ${!v?'active':''}" data-val="false">Nein</div>
        <div class="toggle-opt ${v?'active':''}" data-val="true">Ja</div>
      </div>
    </div>`;
  }
  if (def.type === 'toggle-enum') {
    return `<div class="field">
      <label>${def.label}</label>
      <div class="toggle-group" data-key="${def.key}" data-toggle-enum="1">
        ${def.options.map(o => `<div class="toggle-opt ${value===o?'active':''}" data-val="${escapeHtml(o)}">${escapeHtml(o)}</div>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function attachFieldHandlers(container, prefix) {
  // text, number, date, textarea, select
  container.querySelectorAll('input[data-key], select[data-key], textarea[data-key]').forEach(el => {
    if (el.dataset.multi || el.dataset.photo) return;
    if (el.readOnly) return;
    el.addEventListener('blur', () => handleFieldChange(prefix, el));
    if (el.tagName === 'SELECT' || el.type === 'date') {
      el.addEventListener('change', () => handleFieldChange(prefix, el));
    }
  });
  // multi chips
  container.querySelectorAll('.chip[data-multi]').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
      const key = chip.dataset.key;
      const siblings = container.querySelectorAll(`.chip[data-key="${CSS.escape(key)}"]`);
      const values = Array.from(siblings).filter(c => c.classList.contains('active')).map(c => c.dataset.val);
      saveField(prefix, key, values.length ? values : null);
    });
  });
  // toggle-bool
  container.querySelectorAll('.toggle-group[data-toggle-bool]').forEach(tg => {
    const key = tg.dataset.key;
    tg.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.addEventListener('click', async () => {
        const val = opt.dataset.val === 'true';
        tg.querySelectorAll('.toggle-opt').forEach(o => o.classList.toggle('active', o === opt));
        await saveField(prefix, key, val);
        // Re-render baustelle to swap readonly state
        if (prefix === 'baustelle') renderBaustelle();
        if (prefix === 'fenster') renderFenster();
      });
    });
  });
  // toggle-enum
  container.querySelectorAll('.toggle-group[data-toggle-enum]').forEach(tg => {
    const key = tg.dataset.key;
    tg.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.addEventListener('click', async () => {
        const val = opt.dataset.val;
        tg.querySelectorAll('.toggle-opt').forEach(o => o.classList.toggle('active', o === opt));
        await saveField(prefix, key, val);
        if (prefix === 'fenster') renderFenster();
      });
    });
  });
  // photo
  container.querySelectorAll('input[data-photo]').forEach(el => {
    el.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await handlePhotoUpload(prefix, el.dataset.key, file);
    });
  });
}

function handleFieldChange(prefix, el) {
  const key = el.dataset.key;
  let val = el.value;
  if (el.type === 'number') {
    val = val === '' ? null : Number(val);
  } else if (val === '') {
    val = null;
  }
  saveField(prefix, key, val);
}

/* =============================================================
   OFFLINE SAVE QUEUE
   When a save fails due to network errors, the change is saved to
   localStorage and replayed when the device comes back online.
============================================================= */
const OFFLINE_QUEUE_KEY = 'schuler_aufmass_offline_queue_v1';

function getOfflineQueue() {
  try {
    return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]');
  } catch {
    return [];
  }
}
function setOfflineQueue(queue) {
  try {
    localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
  } catch (e) {
    console.warn('Could not persist offline queue', e);
  }
}
function queueOfflineSave(table, recordId, key, value) {
  const queue = getOfflineQueue();
  // Deduplicate: if same record+key exists, replace it (last write wins)
  const existing = queue.findIndex(it => it.table === table && it.recordId === recordId && it.key === key);
  const item = { table, recordId, key, value, queuedAt: Date.now() };
  if (existing >= 0) queue[existing] = item;
  else queue.push(item);
  setOfflineQueue(queue);
  updateOfflineBadge();
}
function updateOfflineBadge() {
  const queue = getOfflineQueue();
  const badge = document.getElementById('offline-badge');
  if (!badge) return;
  if (queue.length === 0) {
    badge.classList.remove('show');
  } else {
    badge.classList.add('show');
    const label = badge.querySelector('.offline-badge-label');
    if (label) {
      const isOnline = navigator.onLine;
      label.textContent = isOnline
        ? `${queue.length} ${queue.length === 1 ? 'Änderung' : 'Änderungen'} werden synchronisiert…`
        : `Offline – ${queue.length} ${queue.length === 1 ? 'Änderung' : 'Änderungen'} ausstehend`;
    }
  }
}

let offlineFlushing = false;
async function flushOfflineQueue() {
  if (offlineFlushing) return;
  if (!navigator.onLine) return;
  const queue = getOfflineQueue();
  if (queue.length === 0) return;
  offlineFlushing = true;
  updateOfflineBadge();
  const remaining = [];
  for (const item of queue) {
    try {
      const payload = {};
      payload[item.key] = item.value;
      await updateRecord(item.table, item.recordId, payload);
    } catch (e) {
      // Still failing → keep in queue
      remaining.push(item);
    }
  }
  setOfflineQueue(remaining);
  offlineFlushing = false;
  updateOfflineBadge();
  if (remaining.length === 0 && queue.length > 0) {
    toast(`${queue.length} Änderung${queue.length === 1 ? '' : 'en'} synchronisiert`, 'success');
  }
}

// Detect network errors (vs API errors which are still useful failure signals)
function isNetworkError(err) {
  const msg = String(err.message || err);
  return msg.includes('Failed to fetch') ||
         msg.includes('NetworkError') ||
         msg.includes('Network request failed') ||
         msg.includes('Load failed') ||
         !navigator.onLine;
}

// Listen for online/offline events
window.addEventListener('online', () => {
  toast('Online — synchronisiere Änderungen', 'success');
  flushOfflineQueue();
});
window.addEventListener('offline', () => {
  toast('Offline-Modus — Änderungen werden gespeichert', '');
  updateOfflineBadge();
});
// Periodic retry every 30s when online
setInterval(() => { if (navigator.onLine) flushOfflineQueue(); }, 30000);


async function saveField(prefix, key, value) {
  let table, recordId, localRecord;
  if (prefix === 'position') {
    table = T_POSITIONEN;
    const pos = state.positions[state.currentPositionIndex];
    if (!pos) return;
    recordId = pos.id;
    localRecord = pos;
  } else if (prefix === 'baustelle') {
    table = T_AUFMASS;
    recordId = state.currentProjectRecord.id;
    localRecord = state.currentProjectRecord;
  } else if (prefix === 'technik' || prefix === 'fenster') {
    table = T_TECHNIK;
    if (!state.techInfo) return;
    recordId = state.techInfo.id;
    localRecord = state.techInfo;
  }

  // optimistic local update
  const oldVal = localRecord.fields[key];
  if (value == null) delete localRecord.fields[key];
  else localRecord.fields[key] = value;

  // Coerce value to match Airtable field type (e.g. Nutmaß might be text, not number)
  const coerced = coerceValue(table, key, value);

  async function tryUpdate(payloadValue) {
    const payload = {};
    payload[key] = payloadValue;
    return await updateRecord(table, recordId, payload);
  }

  try {
    let updated;
    try {
      updated = await tryUpdate(coerced);
    } catch (firstErr) {
      // Network error → queue offline
      if (isNetworkError(firstErr)) {
        queueOfflineSave(table, recordId, key, coerced);
        showSaveIndicator('queued');
        return;
      }
      // Type mismatch / select-option mismatch fallback
      const msg = String(firstErr.message || '');
      const is422 = msg.includes('INVALID_VALUE_FOR_COLUMN') || msg.includes('INVALID_MULTIPLE_CHOICE_OPTIONS') || msg.includes('422');
      if (is422) {
        dbg(`Retry "${key}" with conversion: ${msg}`, 'info');
        const alternatives = [];
        if (typeof value === 'string' && value.length > 0) {
          alternatives.push(value.toLowerCase());
          alternatives.push(value.charAt(0).toUpperCase() + value.slice(1).toLowerCase());
          if (/^-?\d+([.,]\d+)?$/.test(value)) alternatives.push(Number(value.replace(',', '.')));
        } else if (typeof value === 'number') {
          alternatives.push(String(value));
        } else if (value == null) {
          alternatives.push('');
        }
        let saved = false;
        for (const alt of alternatives) {
          if (alt === value) continue;
          try {
            updated = await tryUpdate(alt);
            dbg(`✓ "${key}" gespeichert als "${alt}"`, 'ok');
            localRecord.fields[key] = alt;
            saved = true;
            break;
          } catch (e2) {
            if (isNetworkError(e2)) {
              queueOfflineSave(table, recordId, key, alt);
              showSaveIndicator('queued');
              return;
            }
          }
        }
        if (!saved) throw firstErr;
      } else {
        throw firstErr;
      }
    }

    // Merge server response into local
    if (updated && updated.fields) {
      localRecord.fields = { ...localRecord.fields, ...updated.fields };
    }
    if (value == null) delete localRecord.fields[key];
    showSaveIndicator();
    if (prefix === 'position' && (key === 'Pos-Nr' || key === 'Kundenposition')) {
      renderPills();
    }
  } catch (e) {
    // Last-resort: if it's a network error, queue it instead of failing
    if (isNetworkError(e)) {
      queueOfflineSave(table, recordId, key, coerced);
      showSaveIndicator('queued');
      return;
    }
    // rollback for non-network errors
    if (oldVal === undefined) delete localRecord.fields[key];
    else localRecord.fields[key] = oldVal;
    const detail = String(e.message || e).split(':').slice(1).join(':').trim().slice(0, 80);
    toast(`Speichern "${key}" fehlgeschlagen${detail ? ': ' + detail : ''}`, 'error');
    dbg(`Save "${key}" failed: ${e.message}`, 'error');
    throw e;
  }
}

async function handlePhotoUpload(prefix, key, file) {
  // Airtable attachments need a public URL. We use base64 data URL (works for small files via content API? No).
  // Airtable requires a URL for attachments. Workaround: upload via Airtable's attachments-content endpoint.
  showSpinner(true);
  try {
    const base64 = await fileToBase64(file);
    // Use new Airtable content upload endpoint
    let recordId;
    if (prefix === 'position') recordId = state.positions[state.currentPositionIndex].id;
    const url = airtableContentUrl(recordId, key);
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': authHeader(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contentType: file.type,
        file: base64,
        filename: file.name || `skizze-${Date.now()}.jpg`
      })
    });
    if (!res.ok) throw new Error('Upload fehlgeschlagen');
    const data = await res.json();
    // update local record
    if (prefix === 'position') {
      state.positions[state.currentPositionIndex].fields = data.fields || state.positions[state.currentPositionIndex].fields;
    }
    renderPositionForm();
    toast('Foto hochgeladen', 'success');
  } catch (e) {
    console.error(e);
    toast('Upload fehlgeschlagen', 'error');
  } finally {
    showSpinner(false);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const res = r.result;
      const base64 = res.split(',')[1];
      resolve(base64);
    };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// Wire up change handlers for all compact baustelle inputs
function attachCompactBaustelleHandlers(container) {
  // All data-cb-key inputs → save to Airtable on change/blur
  container.querySelectorAll('[data-cb-key]').forEach(el => {
    const key = el.dataset.cbKey;
    const isBool = el.dataset.cbBool === '1';
    const isSelect = el.tagName === 'SELECT';
    const triggersName = el.dataset.triggersProjectname === '1';
    const eventName = isBool || isSelect ? 'change' : 'blur';

    el.addEventListener(eventName, async () => {
      let val;
      if (isBool) {
        val = el.checked;
      } else {
        val = el.value.trim();
        if (val === '') val = null;
      }
      try {
        await saveField('baustelle', key, val);
        // Update local state
        if (state.currentProjectRecord) {
          if (val == null) delete state.currentProjectRecord.fields[key];
          else state.currentProjectRecord.fields[key] = val;
        }
        // If Kunde Name or Kunde Ort changed → update Projektname automatically
        if (triggersName) {
          const curFields = state.currentProjectRecord.fields;
          const newProjektname = computeProjectName(curFields['Kunde Name'], curFields['Kunde Ort']);
          if (newProjektname && newProjektname !== curFields['Projektname']) {
            await saveField('baustelle', 'Projektname', newProjektname);
            state.currentProjectRecord.fields['Projektname'] = newProjektname;
            // Update displayed fields without full re-render
            const crumb = document.getElementById('project-name-crumb');
            if (crumb) crumb.textContent = newProjektname;
            const projNameInput = container.querySelector('input[readonly].cb-readonly');
            if (projNameInput) projNameInput.value = newProjektname;
          }
        }
        // If "Baustelle abweichend" toggled → re-render to show/hide fields
        if (key === 'Baustelle abweichend') {
          renderCompactBaustelle();
        }
        showSaveIndicator('saved');
      } catch (e) {
        toast('Speichern fehlgeschlagen', 'error');
      }
    });
  });
}

/* =============================================================
   PDF EXPORT (window.print)
   iPad Safari is picky about window.print() — it requires a direct
   user gesture. We build the print area, wait for images, then show
   a confirmation overlay that triggers window.print() synchronously
   from a real click.
============================================================= */
async function printProject() {
  if (!state.currentProjectRecord) { toast('Kein Projekt geladen', 'error'); return; }
  await triggerPrint(() => buildPrintArea(), 'Gesamtaufmaß');
}

async function printOverview() {
  if (!state.currentProjectRecord) { toast('Kein Projekt geladen', 'error'); return; }
  await triggerPrint(() => buildOverviewPrintArea(), 'Übersicht');
}

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

async function triggerPrint(builderFn, label) {
  showSpinner(true, 'Bereite PDF vor…');
  try {
    // Clear any previous print content first to avoid stale state
    const printArea = document.getElementById('print-area');
    if (printArea) printArea.innerHTML = '';

    builderFn();

    // Wait for all images in print-area to load — show progress
    // CRITICAL: ensure each image only counts ONCE, regardless of load/error/timeout order
    const imgs = Array.from(document.querySelectorAll('#print-area img'));
    if (imgs.length > 0) {
      let loaded = 0;
      let lastShown = -1;
      const updateProgress = () => {
        loaded++;
        // Only update UI if counter actually advances (deduplication safety)
        if (loaded > lastShown) {
          lastShown = loaded;
          // Cap at total so "18/15" cannot happen
          const display = Math.min(loaded, imgs.length);
          showSpinner(true, `Lade Bilder ${display} / ${imgs.length}…`);
        }
      };
      await Promise.all(imgs.map(img => {
        // If already cached and loaded, resolve immediately
        if (img.complete && img.naturalHeight !== 0) {
          updateProgress();
          return Promise.resolve();
        }
        // Otherwise wait for load/error/timeout — but count exactly ONCE
        return new Promise(resolve => {
          let settled = false;
          const done = () => {
            if (settled) return;
            settled = true;
            updateProgress();
            resolve();
          };
          img.addEventListener('load', done, { once: true });
          img.addEventListener('error', done, { once: true });
          setTimeout(done, 5000);
        });
      }));
    }
    showSpinner(true, 'Fertig — öffne Druckdialog…');
    await new Promise(r => setTimeout(r, 200));
  } finally {
    showSpinner(false);
  }

  // On iOS Safari, window.print() must run inside a DIRECT user gesture.
  // Any async gap (fetch, setTimeout, image-wait) breaks that chain →
  // window.print() is silently ignored. So we ALWAYS show the confirm overlay
  // on iOS, letting the user tap "Drucken" which triggers print synchronously.
  if (isIOS()) {
    showPrintConfirm(label);
  } else {
    // Desktop: direct print
    setTimeout(() => window.print(), 150);
  }
}

// Clean up print state after printing is done (or cancelled).
// Called from afterprint event and print-confirm dialog buttons.
function cleanupPrintState() {
  const printArea = document.getElementById('print-area');
  if (printArea) {
    // Empty the DOM so images don't stay referenced and counters reset
    printArea.innerHTML = '';
  }
  // Remove any stale print-confirm overlay
  const overlay = document.getElementById('print-confirm-overlay');
  if (overlay) overlay.remove();
  // Force-hide spinner in case it got stuck somehow
  showSpinner(false);
}

function showPrintConfirm(label) {
  // Remove any existing overlay
  const old = document.getElementById('print-confirm-overlay');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'print-confirm-overlay';
  overlay.className = 'print-confirm-overlay';
  overlay.innerHTML = `
    <div class="print-confirm-modal">
      <div class="print-confirm-icon">📄</div>
      <h3>PDF bereit</h3>
      <p>${escapeHtml(label || 'Dokument')} wurde vorbereitet.<br>Tippe auf „Drucken", um den Druckdialog zu öffnen.</p>
      <div class="print-confirm-actions">
        <button class="print-confirm-btn cancel" id="print-confirm-cancel">Abbrechen</button>
        <button class="print-confirm-btn primary" id="print-confirm-ok">Drucken</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  document.getElementById('print-confirm-cancel').addEventListener('click', () => {
    overlay.remove();
    cleanupPrintState();
  });
  document.getElementById('print-confirm-ok').addEventListener('click', () => {
    overlay.remove();
    // This is a direct user gesture → window.print() works reliably on iOS Safari
    window.print();
    // Schedule cleanup shortly after print returns (iPad Safari doesn't fire afterprint reliably)
    setTimeout(cleanupPrintState, 500);
  });
}

// Register global afterprint cleanup — runs on desktop browsers when print dialog closes
// iPad Safari doesn't fire this reliably, but it's a useful fallback
if (typeof window !== 'undefined') {
  window.addEventListener('afterprint', () => {
    // Small delay so print has fully finished
    setTimeout(cleanupPrintState, 100);
  });
}

              (rolladenActive ? (
                (rollTyp === 'Mauerwerkskasten' ? row('Deckel', rollDeckel) : '') +
                row('Bedienung', bedienungParts || null) +
                row('Bedienung Notiz', f['Bedienung Notiz'])
              ) : '')
            )}

            ${section('Ornamentglas',
              row('Ornamentglas', ornamentActive ? 'Ja' : 'Nein') +
              (ornamentActive && f['Ornament Text'] ? row('Beschreibung', f['Ornament Text']) : '')
            )}

            ${section('Insektenschutz',
              row('Typ', f['Insektenschutz']) +
              row('Notiz', f['Insektenschutz Notiz'])
            )}

            ${f['Außenfensterbank Position'] ? section('Außenfensterbank',
              row('AFB', 'Ja')
            ) : ''}
          </div>

          <!-- Rechte Spalte: Skizze + Notizen + Foto -->
          <div class="pp-pos-visual">
            ${hasSketch ? `
              <div class="pp-section">
                <div class="pp-section-title">Skizze</div>
                <div class="pp-sketch-box"><img src="${sketchUrl}" alt="Skizze Position ${num}"></div>
              </div>
            ` : ''}

            ${(f['Notizen'] || hasNotePhoto) ? `
              <div class="pp-section">
                <div class="pp-section-title">Notizen</div>
                ${f['Notizen'] ? `<div class="pp-block"><div class="pp-value">${escapeHtml(f['Notizen'])}</div></div>` : ''}
                ${hasNotePhoto ? `<div class="pp-note-photo-box"><img src="${notePhotoUrl}" alt="Notiz-Foto Position ${num}"></div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>

        ${footerHtml(`Seite ${pageNum} / ${totalPages} · Position ${num}`)}
      </div>
    `;
  }).join('');

  // Final assembly — order: Baustelle → Technik → Fenster → Positions
  document.getElementById('print-area').innerHTML = pageBaustelle + pageTechnik + pageFenster + positionsHtml;
}

/* =============================================================
   BUILD OVERVIEW PRINT AREA — compact single-page summary
============================================================= */
function buildOverviewPrintArea() {
  const proj = state.currentProjectRecord.fields;
  const tech = state.techInfo?.fields || {};
  const positions = state.positions;
  const today = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const projectName = escapeHtml(proj['Projektname'] || 'Unbenannt');
  const isAngebot = proj['Aufmaß-Typ'] === 'Angebot';

  // Helper: compact "key: value" inline format for summary
  const kv = (label, value) => {
    if (value == null || value === '' || (typeof value === 'string' && !value.trim())) return '';
    return `<span class="ov-kv"><span class="ov-kv-label">${escapeHtml(label)}:</span> <span class="ov-kv-value">${escapeHtml(value)}</span></span>`;
  };
  const kvMulti = (label, value) => {
    if (!Array.isArray(value) || value.length === 0) return '';
    return kv(label, value.join(', '));
  };

  // Kunde name fallback
  const kundeFullName = [proj['Kunde Vorname'], proj['Kunde Name']].filter(Boolean).join(' ');
  const abweichend = !!proj['Baustelle abweichend'];
  const bauOrt = abweichend
    ? [proj['Baustelle PLZ'], proj['Baustelle Ort']].filter(Boolean).join(' ')
    : [proj['Kunde PLZ'], proj['Kunde Ort']].filter(Boolean).join(' ');
  const bauStraße = abweichend ? proj['Baustelle Straße'] : proj['Kunde Straße'];

  // ============================================================
  // HEADER
  // ============================================================
  const headerHtml = `
    <div class="pp-header">
      <div class="pp-header-left">
        <img src="${LOGO_URL}" class="pp-logo" alt="Schuler">
        <div>
          <div class="pp-brand">Haustüren &amp; Fenster Schuler · ${isAngebot ? 'Angebotsaufmaß' : 'Aufmaß'}</div>
          <h1 class="pp-project-title">${projectName}${isAngebot ? ' <span style="background:#f0b000;color:#000;padding:2px 8px;border-radius:4px;font-size:10pt;font-weight:700;vertical-align:middle;">ANGEBOT</span>' : ''}</h1>
          <div style="font-size:10pt;color:#555;margin-top:2px;">Übersicht · ${positions.length} Position${positions.length === 1 ? '' : 'en'}</div>
        </div>
      </div>
      <div class="pp-meta-right">
        ${proj['Datum'] ? `Datum: ${formatDate(proj['Datum'])}<br>` : ''}
        ${proj['Status'] ? `Status: ${escapeHtml(proj['Status'])}<br>` : ''}
        Stand: ${today}
      </div>
    </div>
  `;

  // ============================================================
  // SUMMARY BLOCK — 3 columns: Baustelle | Technik | Fenster
  // ============================================================
  const baustelleSummary = [
    kundeFullName ? kv('Kunde', kundeFullName) : '',
    bauStraße ? kv('Straße', bauStraße) : '',
    bauOrt ? kv('Ort', bauOrt) : '',
    proj['Kunde Telefon'] ? kv('Telefon', proj['Kunde Telefon']) : '',
    proj['Angebotsnummer'] ? kv('Angebot', proj['Angebotsnummer']) : '',
    proj['Auftragsnummer'] ? kv('Auftrag', proj['Auftragsnummer']) : '',
    proj['Verkauf'] ? kv('Verkauf', proj['Verkauf']) : '',
    proj['Technik'] ? kv('Technik', proj['Technik']) : '',
  ].filter(Boolean).join('');

  const technikSummary = [
    kv('Auftragsart', tech['Auftragsart']),
    kvMulti('Zusatzinfo', tech['Zusatzinfo']),
    kv('Montageart', tech['Montageart']),
    kv('U-Wert', tech['U-Wert']),
    kv('Meterriss', tech['Meterriss']),
    kvMulti('Stockwerke', tech['Stockwerke']),
    kv('Gerüst', tech['Gerüst']),
    kv('Kran', tech['Kran']),
    kv('Wunschmonteur', tech['Wunschmonteur']),
  ].filter(Boolean).join('');

  // Fenster summary — collect all window-related fields
  const fensterSummary = [
    kv('Fabrikat', tech['Fenster Fabrikat']),
    kv('System', tech['Fenster System']),
    kv('Farbe außen', tech['Fenster Farbe außen']),
    kv('Farbe innen', tech['Fenster Farbe innen']),
    kv('Glas', tech['Fenster Glas']),
    kv('Griff', tech['Fenstergriff']),
    // AFB / IFB summary
    tech['AFB Status'] === 'neu' ? kv('AFB', `neu, ${tech['AFB Ausladung'] || '?'} mm${tech['AFB Farbe'] ? ', ' + tech['AFB Farbe'] : ''}`) : (tech['AFB Status'] ? kv('AFB', tech['AFB Status']) : ''),
    tech['IFB Status'] === 'neu' ? kv('IFB', `Werzalit, ${tech['IFB Ausladung'] || '?'} mm${tech['IFB Dekor'] ? ', ' + tech['IFB Dekor'] : ''}`) : (tech['IFB Status'] ? kv('IFB', tech['IFB Status']) : ''),
    // Beschattung compact
    tech['MW Rollladen'] ? kv('MW Roll', 'ja') : '',
    tech['MW Raffstore'] ? kv('MW Raff', 'ja') : '',
    tech['VB Rollladen'] ? kv('VB Roll', 'ja') : '',
    tech['VB Raffstore'] ? kv('VB Raff', 'ja') : '',
    tech['AS Rollladen'] ? kv('AS Roll', 'ja') : '',
    tech['AS Raffstore'] ? kv('AS Raff', 'ja') : '',
  ].filter(Boolean).join('');

  const summaryBlock = `
    <div class="ov-summary">
      <div class="ov-summary-col">
        <div class="ov-summary-title">Baustelle</div>
        <div class="ov-summary-body">${baustelleSummary || '<span class="ov-empty">—</span>'}</div>

      <div class="ov-summary-col">

        <div class="ov-summary-body">${fensterSummary || '<span class="ov-empty">—</span>'}</div>
      </div>
    </div>
  `;

  // ============================================================
  // POSITIONS TABLE — one row per position
  // ============================================================
  const tableRows = positions.map((p, i) => {
    const f = p.fields;
    const num = f['Pos-Nr'] || (i + 1);
    const raum = f['Kundenposition'] || '';
    const stockwerk = f['Stockwerk'] || '';
    const ipB = toNum(f['Innenpress B']);
    const ipH = toNum(f['Innenpress H']);
    const apB = toNum(f['Außenpress B']);
    const apH = toNum(f['Außenpress H']);
    const maßeIP = (ipB != null && ipH != null) ? `${ipB}×${ipH}` : '';
    const maßeAP = (apB != null && apH != null) ? `${apB}×${apH}` : '';
    const beschlag = f['Beschlagsart'] || '';
    const richtung = capitalizeLR(f['Öffnungsrichtung']) || '';
    const bedienung = [f['Bedienung Typ'], capitalizeLR(f['Bedienung Seite'])].filter(Boolean).join('/');
    const insekten = f['Insektenschutz'] || '';
    // Kurz-Hinweis: Ornamentglas + Notizen
    const markers = [];
    if (f['Ornamentglas']) markers.push('Ornament');
    if (!f['Rolladen']) markers.push('kein Rolladen');
    const notizRaw = (f['Notizen'] || '').trim();
    if (notizRaw) markers.push(notizRaw.length > 30 ? notizRaw.substring(0, 28) + '…' : notizRaw);
    const kurzinfo = markers.join(' · ');

    return `
      <tr>
        <td class="ov-td-num">${num}</td>
        <td>${escapeHtml(stockwerk)}</td>
        <td>${escapeHtml(raum)}</td>
        <td class="ov-td-maße">${escapeHtml(maßeIP)}</td>
        <td class="ov-td-maße">${escapeHtml(maßeAP)}</td>
        <td>${escapeHtml(beschlag)}</td>
        <td>${escapeHtml(richtung)}</td>
        <td>${escapeHtml(bedienung)}</td>
        <td>${escapeHtml(insekten)}</td>
        <td class="ov-td-note">${escapeHtml(kurzinfo)}</td>
      </tr>
    `;
  }).join('');

  const tableBlock = `
    <div class="ov-table-wrap">
      <table class="ov-table">
        <thead>
          <tr>
            <th class="ov-th-num">Pos</th>
            <th>Stockwerk</th>
            <th>Raum</th>
            <th>Innenpress</th>
            <th>Außenpress</th>
            <th>Beschlag</th>
            <th>Öffnung</th>

    </div>
  `;

  const footerHtml = `<div class="pp-footer">${escapeHtml(projectName)} · Übersicht · ${today}</div>`;

  document.getElementById('print-area').innerHTML = `
    <div class="pp-page ov-page">
      ${headerHtml}
      ${summaryBlock}
      ${tableBlock}
      ${footerHtml}
    </div>
  `;
}

/* =============================================================
   SWIPE HANDLERS
============================================================= */
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  if (state.currentTab !== 'positions' || !document.getElementById('screen-project').classList.contains('active')) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (state.currentTab !== 'positions' || !document.getElementById('screen-project').classList.contains('active')) return;
  if (!touchStartX) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const tag = (e.target.tagName || '').toLowerCase();
  if (['input','select','textarea','button','canvas'].includes(tag)) { touchStartX = 0; return; }
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) nextPosition(); else prevPosition();
  }
  touchStartX = 0;
}, { passive: true });
